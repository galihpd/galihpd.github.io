<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova View - Rocket Launch</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="range"] {
            accent-color: #00d2ff;
        }
        .time-glow {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 3px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 210, 255, 0.3);
            border-radius: 10px;
        }
        /* Animasi Modal */
        #launch-modal {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        #launch-modal.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-10 h-10 border-2 border-zinc-800 border-t-cyan-500 rounded-full animate-spin"></div>
        <p class="mt-6 text-[10px] tracking-[0.3em] font-light text-zinc-400 uppercase">Mengkalkulasi Orbit & Launch Sites...</p>
    </div>

    <!-- Modal Info Peluncuran -->
    <div id="launch-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-6">
        <div id="modal-backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm hidden" onclick="closeModal()"></div>
        <div class="glass w-full max-w-sm rounded-3xl p-6 relative overflow-hidden shadow-2xl border border-cyan-500/30">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span id="modal-status" class="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 text-[8px] font-bold rounded uppercase tracking-widest">Confirmed</span>
                    <h2 id="modal-title" class="text-lg font-extrabold mt-2 leading-tight tracking-tight text-white">Data Peluncuran</h2>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">✕</button>
            </div>
            
            <div class="space-y-4">
                <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Penyedia Layanan</span>
                    <span id="modal-provider" class="text-sm font-semibold text-zinc-200">-</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Lokasi Peluncuran</span>
                    <span id="modal-pad" class="text-sm font-semibold text-zinc-200 leading-snug">-</span>
                </div>
                <div class="grid grid-cols-2 gap-4 pt-2 border-t border-white/5">
                    <div class="flex flex-col">
                        <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Waktu (UTC)</span>
                        <span id="modal-time" class="text-xs font-mono text-cyan-400">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Koordinat</span>
                        <span id="modal-coord" class="text-xs font-mono text-zinc-400">-</span>
                    </div>
                </div>
            </div>
            
            <button id="close-btn" onclick="closeModal()" class="w-full mt-6 py-3 bg-cyan-500 hover:bg-cyan-400 text-black text-[10px] font-extrabold tracking-widest uppercase rounded-xl transition-all">
                Tutup Monitor
            </button>
        </div>
    </div>

    <!-- Header Overlay & Jam -->
    <div class="fixed top-8 left-8 pointer-events-none z-10 space-y-4">
        <div>
            <h1 class="text-xl font-extrabold m-0 leading-none">Novalaunch</h1>
            <p class="text-[10px] font-light tracking-[0.2em] text-cyan-400 uppercase mt-1 text-glow">Montitor Peluncuran Roket Realtime</p>
        </div>
        
        <div class="glass px-5 py-3 rounded-2xl inline-block pointer-events-auto border-l-4 border-l-cyan-500">
            <div class="flex flex-col">
                <span class="text-[9px] font-bold tracking-widest text-zinc-500 uppercase mb-1">Waktu Lokal</span>
                <span id="local-time" class="text-xl font-bold tracking-tighter text-white time-glow">00:00:00</span>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span id="utc-time" class="text-[9px] font-medium tracking-widest text-zinc-400 uppercase">UTC 00:00:00</span>
                </div>
            </div>
        </div>

        <!-- Panel Misi Luar Angkasa -->
        <div class="glass w-80 rounded-2xl p-4 pointer-events-auto overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between mb-3 border-b border-white/10 pb-2">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold tracking-widest text-white uppercase">Manifest Peluncuran</span>
                    <span class="text-[8px] text-zinc-500 uppercase tracking-tighter">Situs Aktif Berpendar di Bumi</span>
                </div>
                <span class="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 text-[8px] font-bold rounded uppercase animate-pulse">Live</span>
            </div>
            <div id="launch-list" class="space-y-2 max-h-80 overflow-y-auto custom-scroll pr-2 text-[11px]">
                <div class="py-4 text-center">
                    <div class="inline-block w-4 h-4 border-2 border-zinc-800 border-t-cyan-500 rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Controls Panel -->
    <div id="controls-panel" class="fixed top-8 right-8 w-64 glass rounded-2xl p-6 z-20 space-y-6">
        <div>
            <label class="block text-[10px] font-bold tracking-widest text-zinc-500 uppercase mb-4">Atmosfer</label>
            <div class="space-y-4">
                <label class="flex items-center justify-between cursor-pointer group">
                    <span class="text-sm font-medium text-zinc-200 group-hover:text-white transition-colors">Visual Awan</span>
                    <input type="checkbox" id="cloud-toggle" checked class="w-4 h-4 rounded border-zinc-700 bg-zinc-900 text-cyan-500 focus:ring-cyan-500">
                </label>
                <div>
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] text-zinc-400 uppercase tracking-widest">Opacity Awan</span>
                        <span id="opacity-val" class="text-[10px] text-cyan-400 font-mono text-xs">0.8</span>
                    </div>
                    <input type="range" id="cloud-opacity" min="0" max="100" value="80" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-bold tracking-widest text-zinc-500 uppercase mb-4">Rotasi Planet</label>
            <div class="space-y-4">
                <label class="flex items-center justify-between cursor-pointer group">
                    <span class="text-sm font-medium text-zinc-200 group-hover:text-white transition-colors">Rotasi Otomatis</span>
                    <input type="checkbox" id="rotation-toggle" checked class="w-4 h-4 rounded border-zinc-700 bg-zinc-900 text-cyan-500 focus:ring-cyan-500">
                </label>
                <input type="range" id="rotation-speed" min="0" max="50" value="12" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-bold tracking-widest text-zinc-500 uppercase mb-4">Eksposur Cahaya</label>
            <input type="range" id="exposure-control" min="5" max="25" value="11" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
        </div>

        <button id="reset-view" class="w-full py-3 bg-white hover:bg-cyan-400 text-black text-[11px] font-extrabold tracking-widest uppercase rounded-xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-white/5">
            Reset Fokus Indonesia
        </button>
    </div>

    <script>
        let scene, camera, renderer, earth, clouds, mainGroup, markerGroup;
        let launchMarkers = [];
        let isDragging = false;
        let isLocked = false; 
        let previousMousePosition = { x: 0, y: 0 };
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const settings = {
            showClouds: true,
            cloudOpacity: 0.8,
            autoRotation: true,
            rotationSpeed: 0.0012,
            exposure: 1.1
        };

        function latLongToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        async function fetchUpcomingLaunches() {
            try {
                const response = await fetch('https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=15&mode=normal');
                if (!response.ok) throw new Error('Limit API tercapai');
                
                const data = await response.json();
                const listContainer = document.getElementById('launch-list');
                listContainer.innerHTML = '';

                while(markerGroup.children.length > 0){ 
                    markerGroup.remove(markerGroup.children[0]); 
                }
                launchMarkers = [];

                if (data.results && data.results.length > 0) {
                    data.results.forEach(launch => {
                        const launchName = launch.name || 'Misi Antariksa';
                        const provider = launch.launch_service_provider?.name || 'Unknown';
                        const dateFormatted = launch.net ? new Date(launch.net).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: '2-digit' }) : 'TBD';
                        const statusAbbrev = launch.status?.abbrev || 'TBD';
                        const statusColor = launch.status?.id === 1 ? 'text-emerald-400' : 'text-zinc-500';

                        const item = document.createElement('div');
                        item.className = "group border-l-2 border-white/5 pl-3 py-2 hover:border-cyan-500 hover:bg-white/5 rounded-r-lg transition-all cursor-pointer";
                        item.onclick = () => showLaunchDetail(launch, true);
                        item.innerHTML = `
                            <div class="flex justify-between items-start gap-2">
                                <span class="font-bold text-zinc-100 truncate w-44 leading-tight group-hover:text-white transition-colors" title="${launchName}">${launchName}</span>
                                <span class="text-cyan-400 font-mono text-[9px] whitespace-nowrap bg-cyan-950/30 px-1 rounded">${dateFormatted}</span>
                            </div>
                            <div class="flex justify-between items-center mt-1">
                                <p class="text-zinc-500 text-[10px] truncate w-32 uppercase tracking-tighter font-semibold">${provider}</p>
                                <span class="text-[8px] uppercase tracking-widest font-bold ${statusColor}">${statusAbbrev}</span>
                            </div>
                        `;
                        listContainer.appendChild(item);

                        if (launch.pad && launch.pad.latitude !== null && launch.pad.longitude !== null) {
                            addLaunchMarker(launch.pad.latitude, launch.pad.longitude, launch);
                        }
                    });
                }
            } catch (error) {
                console.error("Gagal sinkronisasi data:", error);
            }
        }

        function addLaunchMarker(lat, lon, launchData) {
            const position = latLongToVector3(lat, lon, 1);
            
            const markerGeo = new THREE.SphereGeometry(0.02, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.9 });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(position);
            
            const haloGeo = new THREE.SphereGeometry(0.04, 16, 16);
            const haloMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.3 });
            const halo = new THREE.Mesh(haloGeo, haloMat);
            halo.position.copy(position);
            
            marker.userData = { 
                isMarker: true, 
                halo: halo, 
                pulse: Math.random() * Math.PI,
                launch: launchData
            };
            
            markerGroup.add(marker);
            markerGroup.add(halo);
            launchMarkers.push(marker);
        }

        function showLaunchDetail(launch, lock = false) {
            if (isLocked && !lock) return; 

            document.getElementById('modal-title').innerText = launch.name || 'N/A';
            document.getElementById('modal-provider').innerText = launch.launch_service_provider?.name || 'Unknown';
            document.getElementById('modal-pad').innerText = launch.pad?.name || 'Unknown Pad';
            document.getElementById('modal-status').innerText = launch.status?.name || 'TBD';
            document.getElementById('modal-time').innerText = launch.net ? new Date(launch.net).toISOString().replace('T', ' ').substring(0, 19) : 'TBD';
            document.getElementById('modal-coord').innerText = `${launch.pad?.latitude?.toFixed(4)}, ${launch.pad?.longitude?.toFixed(4)}`;
            
            const modal = document.getElementById('launch-modal');
            modal.classList.add('active');

            if (lock) {
                isLocked = true;
                document.getElementById('modal-backdrop').classList.remove('hidden');
                document.getElementById('close-btn').innerText = "Tutup Monitor";
            } else {
                document.getElementById('close-btn').innerText = "Klik Dot Untuk Mengunci Data";
            }
        }

        function closeModal() {
            isLocked = false;
            document.getElementById('launch-modal').classList.remove('active');
            document.getElementById('modal-backdrop').classList.add('hidden');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('local-time').textContent = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('utc-time').textContent = `UTC ${now.getUTCHours().toString().padStart(2, '0')}:${now.getUTCMinutes().toString().padStart(2, '0')}:${now.getUTCSeconds().toString().padStart(2, '0')}`;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.8;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = settings.exposure;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);

            const starGeo = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 6000; i++) {
                starVertices.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.4, transparent: true, opacity: 0.6})));

            // mainGroup sekarang bertindak sebagai PITCH (naik-turun)
            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous');

            const earthTex = textureLoader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg', () => resetToIndonesia());
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(1, 64, 64),
                new THREE.MeshPhongMaterial({ map: earthTex, specular: new THREE.Color('#222'), shininess: 15 })
            );
            mainGroup.add(earth);

            const cloudTex = textureLoader.load('https://clouds.matteason.co.uk/images/8192x4096/clouds.jpg', () => {
                finishLoading();
                fetchUpcomingLaunches(); 
            });

            clouds = new THREE.Mesh(
                new THREE.SphereGeometry(1.015, 64, 64),
                new THREE.MeshLambertMaterial({ color: 0xffffff, alphaMap: cloudTex, transparent: true, depthWrite: false, opacity: settings.cloudOpacity })
            );
            mainGroup.add(clouds);

            markerGroup = new THREE.Group();
            mainGroup.add(markerGroup);

            setupControls();
            setInterval(updateClock, 1000);
            
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', (e) => { 
                if (e.target.closest('#controls-panel') || e.target.closest('.glass')) return;
                isDragging = true; 
                previousMousePosition = { x: e.clientX, y: e.clientY }; 
            });
            
            document.addEventListener('mousemove', onDocumentMouseMove);
            document.addEventListener('click', onCanvasClick);
            document.addEventListener('mouseup', () => isDragging = false);
            
            document.addEventListener('wheel', (e) => {
                camera.position.z = Math.min(Math.max(camera.position.z + e.deltaY * 0.002, 1.25), 6);
            }, { passive: false });

            animate();
        }

        function onDocumentMouseMove(event) {
            if (isDragging) {
                const delta = { x: event.clientX - previousMousePosition.x, y: event.clientY - previousMousePosition.y };
                
                // PERBAIKAN: Pisahkan rotasi X dan Y
                // Sumbu Y (Horizontal) memutar objek di dalam grup secara lokal
                earth.rotation.y += delta.x * 0.005;
                clouds.rotation.y += delta.x * 0.005;
                markerGroup.rotation.y += delta.x * 0.005;

                // Sumbu X (Vertikal) memutar grup utama (Pitch)
                mainGroup.rotation.x += delta.y * 0.005;
                
                // Batasi agar tidak berputar 360 derajat secara vertikal (opsional, biar gak pusing)
                mainGroup.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, mainGroup.rotation.x));

                previousMousePosition = { x: event.clientX, y: event.clientY };
                return;
            }

            if (isLocked || event.target.closest('#controls-panel') || event.target.closest('.glass')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markerGroup.children);

            if (intersects.length > 0) {
                const object = intersects.find(i => i.object.userData.isMarker)?.object;
                if (object) {
                    showLaunchDetail(object.userData.launch, false);
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (!isLocked) document.getElementById('launch-modal').classList.remove('active');
                document.body.style.cursor = 'default';
            }
        }

        function onCanvasClick(event) {
            if (event.target.closest('#controls-panel') || event.target.closest('.glass')) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markerGroup.children);

            if (intersects.length > 0) {
                const object = intersects.find(i => i.object.userData.isMarker)?.object;
                if (object) showLaunchDetail(object.userData.launch, true); 
            }
        }

        function setupControls() {
            document.getElementById('cloud-toggle').addEventListener('change', (e) => clouds.visible = e.target.checked);
            document.getElementById('cloud-opacity').addEventListener('input', (e) => {
                const val = e.target.value / 100;
                settings.cloudOpacity = val;
                clouds.material.opacity = val;
                document.getElementById('opacity-val').textContent = val.toFixed(1);
            });
            document.getElementById('rotation-toggle').addEventListener('change', (e) => settings.autoRotation = e.target.checked);
            document.getElementById('rotation-speed').addEventListener('input', (e) => settings.rotationSpeed = e.target.value / 10000);
            document.getElementById('exposure-control').addEventListener('input', (e) => renderer.toneMappingExposure = e.target.value / 10);
            document.getElementById('reset-view').addEventListener('click', resetToIndonesia);
        }

        function resetToIndonesia() {
            // Reset Pitch (Vertikal)
            mainGroup.rotation.set(0, 0, 0);
            
            // Putar objek di dalamnya ke posisi Indonesia (Khatulistiwa)
            const indRotation = -Math.PI / 1.6;
            earth.rotation.set(0, indRotation, 0);
            clouds.rotation.set(0, indRotation, 0);
            markerGroup.rotation.set(0, indRotation, 0);
            
            camera.position.set(0, 0, 2.8);
            camera.lookAt(0, 0, 0);
        }

        function finishLoading() {
            const screen = document.getElementById('loading-screen');
            screen.style.opacity = '0';
            setTimeout(() => screen.style.display = 'none', 700);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-rotation hanya di sumbu Y (Horizontal)
            if (!isDragging && settings.autoRotation) {
                earth.rotation.y += settings.rotationSpeed;
                clouds.rotation.y += settings.rotationSpeed * 1.05;
                markerGroup.rotation.y += settings.rotationSpeed;
            }

            launchMarkers.forEach(m => {
                m.userData.pulse += 0.05;
                const scale = 1 + Math.sin(m.userData.pulse) * 0.4;
                m.userData.halo.scale.set(scale, scale, scale);
                m.userData.halo.material.opacity = 0.4 - (Math.sin(m.userData.pulse) * 0.2);
            });

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
