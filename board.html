<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodboard Studio</title>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- PDF & Canvas Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Alwan Color Picker (Premium UI) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alwan/dist/css/alwan.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/alwan/dist/js/alwan.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        display: ['"Outfit"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                        },
                        // Custom palette matching the 3D software aesthetic
                        app: {
                            bg: '#0e0e0e',          
                            panel: '#161616',       
                            surface: '#1c1c1c',     
                            surfaceHover: '#2a2a2a',
                            border: '#2a2a2a',      
                            borderLight: '#3a3a3a', 
                            textMuted: '#888888',   
                            text: '#e5e5e5',        
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { overscroll-behavior: none; }
        
        .bg-dots {
            background-color: #fafafa; 
            background-image: radial-gradient(#d4d4d8 1px, transparent 1px);
        }
        .dark .bg-dots {
            background-color: #0e0e0e; 
            background-image: radial-gradient(#222222 1px, transparent 1px); 
        }
        
        .bg-solid {
            background-color: #fafafa;
        }
        .dark .bg-solid {
            background-color: #0e0e0e;
        }

        .tool-active {
            background-color: #e0f2fe;
            color: #0284c7;
            border-color: #bae6fd;
        }
        .dark .tool-active {
            background-color: #333333; 
            color: #ffffff; 
            border-color: #4a4a4a; 
        }

        .element-item { transition: transform 0.1s ease, box-shadow 0.2s ease; }
        .element-item:hover { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        .image-dragging {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }
        
        .delete-btn { display: none; }
        .image-container:hover .delete-btn, .element-container:hover .delete-btn { display: flex; }

        /* Transform Handles (Shown only on selection) */
        .element-container .handle { display: none; }
        .element-container.ring-1 .handle { display: flex; }

        .point-edit-node {
            transition: background-color 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
        }
        .point-edit-node-selected {
            background-color: #0ea5e9 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.35);
        }
        .dark .point-edit-node-selected {
            background-color: #38bdf8 !important;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.35);
        }

        /* Drop Indicators for Layers */
        .drag-over-top { box-shadow: inset 0 2px 0 0 #0ea5e9 !important; }
        .drag-over-bottom { box-shadow: inset 0 -2px 0 0 #0ea5e9 !important; }
        .dark .drag-over-top { box-shadow: inset 0 2px 0 0 #ffffff !important; }
        .dark .drag-over-bottom { box-shadow: inset 0 -2px 0 0 #ffffff !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 8px; }
        .dark ::-webkit-scrollbar-thumb { background: #333333; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #555555; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Hide Number Input Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Brush Preview Cursor */
        #brush-cursor { mix-blend-mode: difference; }

        /* Custom Rotate Cursors */
        .cursor-rotate-nw { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16.5 15.5C16.5 11.0817 12.9183 7.5 8.5 7.5H6.5V10L2.5 6L6.5 2V4.5H8.5C14.5751 4.5 19.5 9.42487 19.5 15.5H16.5Z" fill="black" stroke="white" stroke-width="1"/></svg>') 12 12, auto; }
        .cursor-rotate-ne { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 15.5C7.5 11.0817 11.0817 7.5 15.5 7.5H17.5V10L21.5 6L17.5 2V4.5H15.5C9.42487 4.5 4.5 9.42487 4.5 15.5H7.5Z" fill="black" stroke="white" stroke-width="1"/></svg>') 12 12, auto; }
        .cursor-rotate-sw { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16.5 8.5C16.5 12.9183 12.9183 16.5 8.5 16.5H6.5V14L2.5 18L6.5 22V19.5H8.5C14.5751 19.5 19.5 14.5751 19.5 8.5H16.5Z" fill="black" stroke="white" stroke-width="1"/></svg>') 12 12, auto; }
        .cursor-rotate-se { cursor: url('data:image/svg+xml;utf8,<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 8.5C7.5 12.9183 11.0817 16.5 15.5 16.5H17.5V14L21.5 18L17.5 22V19.5H15.5C9.42487 19.5 4.5 14.5751 4.5 8.5H7.5Z" fill="black" stroke="white" stroke-width="1"/></svg>') 12 12, auto; }

        /* Customizing Alwan Color Picker to look aesthetic */
        .alwan { border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); font-family: 'Inter', sans-serif; z-index: 999999 !important; }
        #color-picker-modal .alwan {
            display: block !important;
            width: 100% !important;
            min-width: 100% !important;
            margin: 0 !important;
            border: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            background: transparent;
            z-index: 1 !important;
        }
        #color-picker-container {
            width: 100%;
        }
        #color-picker-modal .alwan > * {
            width: 100% !important;
            max-width: none !important;
        }
        #color-picker-modal .alwan__wrap,
        #color-picker-modal .alwan__container,
        #color-picker-modal .alwan__picker,
        #color-picker-modal .alwan__color,
        #color-picker-modal .alwan__sliders,
        #color-picker-modal .alwan__inputs,
        #color-picker-modal .alwan__swatches {
            width: 100% !important;
            max-width: none !important;
        }
        #color-picker-modal .alwan,
        #color-picker-modal .alwan * {
            box-sizing: border-box;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden text-slate-800 dark:text-app-text bg-white dark:bg-app-bg transition-colors duration-200 font-sans">

    <!-- Top Container: Header & Tabs -->
    <div class="flex flex-col z-[200] shadow-sm dark:shadow-none relative">
        <header class="bg-white dark:bg-app-panel border-b border-slate-200 dark:border-app-border px-5 flex flex-row items-center justify-between transition-colors duration-200 z-20 relative pt-2 h-[68px]">
            
            <div class="flex items-center gap-1 shrink-0">
                <div class="flex items-center shrink-0 h-full">
                    <div class="relative flex items-center h-full">
                        <button onclick="toggleFileMenu()" class="flex items-center justify-center px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-app-surfaceHover rounded-md transition-colors text-slate-700 dark:text-app-text" title="File Menu">
                            <i class="ph ph-list text-xl"></i>
                        </button>
                        <div id="file-menu" class="hidden absolute top-[calc(100%-10px)] left-0 mt-2 w-64 bg-white dark:bg-app-surface/90 dark:backdrop-blur-xl rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] border border-slate-200 dark:border-[#333] py-2 z-[250]">
                            <button onclick="createNewProject(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-brand-50 dark:hover:bg-brand-500/20 text-base flex items-center justify-between transition-colors">
                                <span>New Project</span><span class="text-sm text-slate-400 dark:text-app-textMuted">Ctrl+N</span>
                            </button>
                            <button onclick="openLocalFile(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-brand-50 dark:hover:bg-brand-500/20 text-base flex items-center justify-between transition-colors">
                                <span>Open Local (.mb)</span>
                            </button>
                            <button onclick="saveProjectToLocal(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-brand-50 dark:hover:bg-brand-500/20 text-base flex items-center justify-between transition-colors">
                                <span>Save</span><span class="text-sm text-slate-400 dark:text-app-textMuted">Ctrl+S</span>
                            </button>
                            <button onclick="saveProjectAsNew(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-brand-50 dark:hover:bg-brand-500/20 text-base flex items-center justify-between transition-colors">
                                <span>Save As...</span>
                            </button>
                            <div class="h-px bg-slate-200 dark:bg-app-border my-1.5"></div>
                            <button onclick="document.getElementById('image-upload').click(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-brand-50 dark:hover:bg-brand-500/20 text-base flex items-center justify-between transition-colors">
                                <span>Import Image...</span>
                            </button>
                            <div class="h-px bg-slate-200 dark:bg-app-border my-1.5"></div>
                            <button onclick="clearCanvas(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-red-50 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400 text-base flex items-center justify-between transition-colors">
                                <span>Clear All Canvas</span>
                            </button>
                            <div class="h-px bg-slate-200 dark:bg-app-border my-1.5"></div>
                            <button onclick="openExportModal(); toggleFileMenu();" class="w-full text-left px-5 py-2.5 hover:bg-brand-50 dark:hover:bg-brand-500/20 text-base flex items-center justify-between transition-colors">
                                <span>Export to PDF...</span>
                            </button>
                        </div>
                    </div>
                    <div class="w-px h-5 bg-slate-300 dark:bg-[#333] mx-3"></div>
                </div>

                <div class="relative h-[68px] px-3 py-2 flex items-center justify-between shrink-0">
                    <div id="project-switcher" onclick="toggleProjectMenu(event)" class="min-w-0 text-left group flex rounded-md px-0.5 py-1 hover:bg-slate-100 dark:hover:bg-white/5 transition-colors cursor-pointer">
                        <div class="flex items-center gap-2 min-w-0">
                            <input id="project-title-input" type="text"
                                   readonly
                                   onchange="updateProjectTitle(this.value)"
                                   onclick="event.stopPropagation(); toggleProjectMenu(event);"
                                   ondblclick="event.stopPropagation(); this.removeAttribute('readonly'); this.focus(); this.select();"
                                   onblur="this.setAttribute('readonly', 'true'); window.getSelection().removeAllRanges();"
                                   class="bg-transparent border-none focus:outline-none min-w-0 truncate text-sm font-semibold text-slate-900 dark:text-white cursor-pointer">
                            <i class="ph ph-caret-down text-[11px] text-slate-400 dark:text-slate-500 shrink-0 group-hover:text-slate-700 dark:group-hover:text-white"></i>
                        </div>
                    </div>
                    <div class="h-6 w-px bg-slate-200 dark:bg-app-border mx-2"></div>
                    <button onclick="createNewProject()" class="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-app-surface dark:hover:bg-app-surfaceHover text-slate-700 dark:text-white shadow-sm transition-colors" title="New Project">
                        <i class="ph ph-plus text-xl"></i>
                    </button>
                    <div id="project-menu" class="hidden absolute left-0 top-[calc(100%+8px)] z-[260] rounded-lg border border-slate-200 dark:border-app-border bg-white dark:bg-app-surface shadow-[0_16px_40px_rgba(0,0,0,0.35)] overflow-hidden"></div>
                </div>
            </div>

            <div class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center gap-1.5 pointer-events-auto z-[260]">
                <div class="flex items-center gap-1.5 bg-slate-100 dark:bg-app-surface p-1.5 rounded-lg border border-slate-200 dark:border-app-border transition-colors">
                    <button onclick="changeZoom(-0.1)" class="p-1.5 hover:bg-white dark:hover:bg-app-surfaceHover text-slate-600 dark:text-app-textMuted dark:hover:text-white rounded-md transition-colors" title="Zoom Out (-)">
                        <i class="ph ph-minus text-base"></i>
                    </button>
                    <span id="zoom-label" class="text-sm font-semibold w-12 text-center text-slate-600 dark:text-app-text cursor-pointer hover:text-brand-600 dark:hover:text-white" onclick="centerBoard()" title="Reset View (0)">100%</span>
                    <button onclick="changeZoom(0.1)" class="p-1.5 hover:bg-white dark:hover:bg-app-surfaceHover text-slate-600 dark:text-app-textMuted dark:hover:text-white rounded-md transition-colors" title="Zoom In (+)">
                        <i class="ph ph-plus text-base"></i>
                    </button>
                </div>

                <div class="flex items-center bg-slate-100 dark:bg-app-surface p-1.5 rounded-lg border border-slate-200 dark:border-app-border transition-colors gap-0.5 ml-1">
                    <button onclick="setMode('move')" id="btn-move" class="tool-active flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Select / Move (V)">
                        <i class="ph ph-arrows-out-cardinal text-xl"></i>
                    </button>
                    
                    <button onclick="setMode('frame')" id="btn-frame" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Add Canvas/Frame (F)">
                        <i class="ph ph-frame-corners text-xl"></i>
                    </button>

                    <div class="w-px bg-slate-300 dark:bg-app-border mx-1 my-2 h-6"></div>

                    <button onclick="setMode('text')" id="btn-text" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Add Text (T)">
                        <i class="ph ph-text-t text-xl"></i>
                    </button>

                    <div class="relative flex items-center group">
                        <button onclick="setMode('shape')" id="btn-shape" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-8 h-10 rounded-l-md transition-all" title="Add Shape (R)">
                            <i class="ph ph-square text-xl" id="current-shape-icon"></i>
                        </button>
                        <button onclick="toggleShapeMenu(event)" class="text-slate-500 hover:text-slate-800 dark:hover:text-white flex items-center justify-center w-3 h-10 rounded-r-md transition-all">
                            <i class="ph ph-caret-down text-[10px]"></i>
                        </button>
                        <div id="shape-menu" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 bg-white dark:bg-app-surface/95 dark:backdrop-blur-xl rounded-lg shadow-xl border border-slate-200 dark:border-[#333] p-1 flex gap-1 z-[250]">
                            <button onclick="selectShapeType('rect')" class="p-2 text-slate-700 dark:text-app-text hover:bg-slate-100 dark:hover:bg-[#333] rounded transition-colors" title="Rectangle"><i class="ph ph-square text-xl"></i></button>
                            <button onclick="selectShapeType('circle')" class="p-2 text-slate-700 dark:text-app-text hover:bg-slate-100 dark:hover:bg-[#333] rounded transition-colors" title="Circle"><i class="ph ph-circle text-xl"></i></button>
                            <button onclick="selectShapeType('triangle')" class="p-2 text-slate-700 dark:text-app-text hover:bg-slate-100 dark:hover:bg-[#333] rounded transition-colors" title="Triangle"><i class="ph ph-triangle text-xl"></i></button>
                            <button onclick="selectShapeType('star')" class="p-2 text-slate-700 dark:text-app-text hover:bg-slate-100 dark:hover:bg-[#333] rounded transition-colors" title="Star"><i class="ph ph-star text-xl"></i></button>
                        </div>
                    </div>

                    <button onclick="setMode('pentool')" id="btn-pentool" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Vector Pen (B)">
                        <i class="ph ph-bezier-curve text-xl"></i>
                    </button>

                    <button onclick="setMode('connect')" id="btn-connect" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Kabel (C)">
                        <i class="ph ph-link text-xl"></i>
                    </button>

                    <div class="w-px bg-slate-300 dark:bg-app-border mx-1 my-2 h-6"></div>
                    
                    <button onclick="setMode('pen')" id="btn-pen" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Pulpen (P)">
                        <i class="ph ph-pen-nib text-xl"></i>
                    </button>
                    <button onclick="setMode('pencil')" id="btn-pencil" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Pensil (N)">
                        <i class="ph ph-pencil-simple text-xl"></i>
                    </button>
                    <button onclick="setMode('highlighter')" id="btn-highlighter" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Stabilo (H)">
                        <i class="ph ph-marker-circle text-xl"></i>
                    </button>
                    <button onclick="setMode('eraser')" id="btn-eraser" class="text-slate-600 dark:text-app-textMuted hover:bg-white dark:hover:bg-app-surfaceHover hover:text-slate-900 dark:hover:text-white flex items-center justify-center w-10 h-10 rounded-md transition-all" title="Penghapus Coretan (E)">
                        <i class="ph ph-eraser text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="absolute right-5 flex items-center gap-1.5 pointer-events-auto z-[260]">
                <button onclick="undo()" id="btn-undo" class="text-slate-400 dark:text-app-border p-2 w-10 h-10 flex items-center justify-center rounded-md transition-colors" title="Undo (Ctrl+Z)" disabled>
                    <i class="ph ph-arrow-u-up-left text-xl"></i>
                </button>
                <button onclick="redo()" id="btn-redo" class="text-slate-400 dark:text-app-border p-2 w-10 h-10 flex items-center justify-center rounded-md transition-colors" title="Redo (Ctrl+Y)" disabled>
                    <i class="ph ph-arrow-u-up-right text-xl"></i>
                </button>
                
                <div class="w-px h-7 bg-slate-200 dark:bg-app-border my-auto mx-1"></div>

                <button onclick="toggleSnap()" id="btn-snap" class="text-slate-500 dark:text-app-textMuted hover:bg-slate-200 dark:hover:bg-app-surface w-10 h-10 flex items-center justify-center rounded-md transition-colors" title="Snap to Grid (S)">
                    <i class="ph ph-magnet text-xl"></i>
                </button>

                <div class="w-px h-7 bg-slate-200 dark:bg-app-border my-auto mx-1"></div>

                <button onclick="toggleDarkMode()" id="btn-dark" class="text-slate-500 dark:text-app-textMuted hover:bg-slate-200 dark:hover:bg-app-surface w-10 h-10 flex items-center justify-center rounded-md transition-colors" title="Toggle Dark Mode">
                    <i class="ph ph-moon text-xl" id="icon-dark"></i>
                </button>

                <input type="file" id="image-upload" class="hidden" accept="image/*" multiple onchange="handleImageUpload(event)">
                <input type="file" id="mb-upload" class="hidden" accept=".mb" onchange="fallbackLoadLocal(event)">
                <button onclick="openExportModal()" class="ml-1 bg-slate-800 dark:bg-white hover:bg-slate-700 dark:hover:bg-gray-200 text-white dark:text-black py-2.5 px-4 rounded-lg transition-colors flex items-center gap-2 text-sm font-semibold tracking-wide whitespace-nowrap shadow-md">
                    <i class="ph ph-export text-xl"></i>
                    <span>Export</span>
                </button>
            </div>
        </header>
        
        <!-- Text Format Floating Toolbar (Hidden by default) -->
        <div id="text-format-toolbar" class="hidden absolute top-20 left-1/2 -translate-x-1/2 bg-white dark:bg-app-surface/95 dark:backdrop-blur-xl border border-slate-200 dark:border-[#333] rounded-lg shadow-xl p-2 flex items-center gap-2 z-[250]">
            <select id="text-font" onchange="applyTextFormat('font', this.value)" onmousedown="event.preventDefault();" class="bg-slate-100 dark:bg-[#222] border-none rounded px-2 py-1 text-sm text-slate-800 dark:text-white focus:ring-1 focus:ring-brand-500 outline-none cursor-pointer">
                <option value='"Inter", sans-serif'>Inter</option>
                <option value='"Outfit", sans-serif'>Outfit</option>
                <option value='monospace'>Monospace</option>
                <option value='serif'>Serif</option>
            </select>
            
            <div class="flex items-center bg-slate-100 dark:bg-[#222] rounded px-2 py-1">
                <i class="ph ph-text-aa text-slate-500 dark:text-app-textMuted mr-1"></i>
                <input type="number" id="text-size" class="bg-transparent border-none w-12 text-sm text-slate-800 dark:text-white outline-none" title="Font Size (Drag horizontally to scrub)">
            </div>

            <div class="w-px h-5 bg-slate-300 dark:bg-app-border"></div>

        // --- HELPER FUNCTION UNTUK MEMBULATKAN SUDUT VECTOR PATH NATIVE ---
        function getRoundedPath(points, radius, isClosed, pointRadii = null, scaleX = 1, scaleY = 1) {
            const radii = points.map((_, index) => {
                const pointRadius = Array.isArray(pointRadii) ? parseFloat(pointRadii[index]) : NaN;
                return Number.isFinite(pointRadius) ? Math.max(0, pointRadius) : Math.max(0, parseFloat(radius) || 0);
            });
            const hasRoundedPoint = radii.some(r => r > 0);

            if (points.length < 3 || !hasRoundedPoint) {
                let d = '';
                if(points.length > 0) d += `M ${points[0].x} ${points[0].y}`;
                for(let i=1; i<points.length; i++) d += ` L ${points[i].x} ${points[i].y}`;
                return isClosed && points.length > 2 ? d + ' Z' : d;
            }

            let d = "";
            const len = points.length;
            
            for (let i = 0; i < len; i++) {
                let p = points[i];
                let prev = isClosed ? points[(i - 1 + len) % len] : points[i - 1];
                let next = isClosed ? points[(i + 1) % len] : points[i + 1];
                let pointRadius = radii[i];

                if (!prev || !next) {
                    if (i === 0) d += `M ${p.x} ${p.y} `;
                    else d += `L ${p.x} ${p.y} `;
                    continue;
                }

                let pPx = { x: p.x * scaleX, y: p.y * scaleY };
                let prevPx = { x: prev.x * scaleX, y: prev.y * scaleY };
                let nextPx = { x: next.x * scaleX, y: next.y * scaleY };

                let dx1 = prevPx.x - pPx.x, dy1 = prevPx.y - pPx.y;
                let d1 = Math.sqrt(dx1*dx1 + dy1*dy1) || 1;
                let dx2 = nextPx.x - pPx.x, dy2 = nextPx.y - pPx.y;
                let d2 = Math.sqrt(dx2*dx2 + dy2*dy2) || 1;

                let r = Math.min(pointRadius, d1/2, d2/2);

                if (r <= 0.1) {
                     if (i === 0) {
                         if (isClosed) d += `M ${p.x} ${p.y} `; 
                         else d += `M ${p.x} ${p.y} `;
                     } else {
                         d += `L ${p.x} ${p.y} `;
                     }
                     continue;
                }

                let p1x = (pPx.x + (dx1 / d1) * r) / scaleX;
                let p1y = (pPx.y + (dy1 / d1) * r) / scaleY;
                let p2x = (pPx.x + (dx2 / d2) * r) / scaleX;
                let p2y = (pPx.y + (dy2 / d2) * r) / scaleY;

                if (i === 0) {
                    if (isClosed) d += `M ${p1x} ${p1y} Q ${p.x} ${p.y} ${p2x} ${p2y} `;
                    else d += `M ${p.x} ${p.y} `;
                } else {
                    d += `L ${p1x} ${p1y} Q ${p.x} ${p.y} ${p2x} ${p2y} `;
                }
            }
            
            if (isClosed) d += ' Z';
            return d;
        }

        function setupColorPickerDrag() {
            if (isColorPickerDragSetup) return;
            isColorPickerDragSetup = true;

            const modal = document.getElementById('color-picker-modal');
            const header = document.getElementById('color-picker-header');

            const getDragPoint = (e) => e.touches ? e.touches[0] : e;
            const startDrag = (e) => {
                if (e.type === 'mousedown' && e.button !== 0) return;
                const point = getDragPoint(e);
                const rect = modal.getBoundingClientRect();
                isColorPickerDragging = true;
                colorPickerStartX = point.clientX - rect.left;
                colorPickerStartY = point.clientY - rect.top;
                modal.style.left = rect.left + 'px';
                modal.style.top = rect.top + 'px';
                modal.style.transform = 'none';
                header.style.cursor = 'grabbing';
                e.preventDefault();
            };

            header.addEventListener('mousedown', startDrag);
            header.addEventListener('touchstart', startDrag, {passive: false});

            const moveDrag = (e) => {
                if (!isColorPickerDragging) return;
                const point = getDragPoint(e);
                
                const newX = point.clientX - colorPickerStartX;
                const newY = point.clientY - colorPickerStartY;
                
                modal.style.left = newX + 'px';
                modal.style.top = newY + 'px';
                e.preventDefault();
            };

            document.addEventListener('mousemove', moveDrag);
            document.addEventListener('touchmove', moveDrag, {passive: false});

            const stopDrag = () => {
                isColorPickerDragging = false;
                header.style.cursor = 'move';
            };

            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        // --- EXPORT SELECTED ---

        // --- GLOBAL SNAPPING HELPER ---
        function snapValue(val, type) {
            let snapped = val;
            let didSnap = false;
            const threshold = 10 / zoomLevel; 
            const guides = type === 'x' ? verticalGuides : horizontalGuides;
            
            // Snap to guides first
            for (let g of guides) {
                if (Math.abs(val - g) < threshold) {
                    snapped = g;
                    didSnap = true;
                    break;
                }
            }
            
            // Snap to grid if enabled and no guide snapped
            if (!didSnap && isSnapEnabled) {
                snapped = Math.round(val / GRID_SIZE) * GRID_SIZE;
            }
            
            return snapped;
        }

        // Fungsi baru untuk guide menempel (snap) ke elemen di canvas
        function snapGuideToElements(val, type) {
            let snapped = val;
            let minDiff = 10 / zoomLevel;
            const elements = document.querySelectorAll('.element-container');
            const boardRect = imageLayer.getBoundingClientRect();

            elements.forEach(el => {
                if (el.dataset.hidden === 'true') return;
                const rect = el.getBoundingClientRect();
                
                if (type === 'vertical') { 
                    const left = (rect.left - boardRect.left) / zoomLevel;
                    const right = (rect.right - boardRect.left) / zoomLevel;
                    const center = left + (rect.width / zoomLevel) / 2;
                    
                    [left, center, right].forEach(target => {
                        if (Math.abs(val - target) < minDiff) {
                            snapped = target;
                            minDiff = Math.abs(val - target);
                        }
                    });
                } else { 
                    const top = (rect.top - boardRect.top) / zoomLevel;
                    const bottom = (rect.bottom - boardRect.top) / zoomLevel;
                    const center = top + (rect.height / zoomLevel) / 2;
                    
                    [top, center, bottom].forEach(target => {
                        if (Math.abs(val - target) < minDiff) {
                            snapped = target;
                            minDiff = Math.abs(val - target);
                        }
                    });
                }
            });

            if (isSnapEnabled && snapped === val) {
                const gridSnapped = Math.round(val / GRID_SIZE) * GRID_SIZE;
                if (Math.abs(val - gridSnapped) < minDiff) {
                    snapped = gridSnapped;
                }
            }

            return snapped;
        }

        // --- RULERS LOGIC ---
        function drawRulers() {
            const rulerH = document.getElementById('ruler-h');
            const rulerV = document.getElementById('ruler-v');
            if(!rulerH || !rulerV) return;

            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#666666' : '#94a3b8';
            const tickColor = isDark ? '#333333' : '#e2e8f0';
            
            rulerH.width = rulerH.clientWidth;
            rulerH.height = rulerH.clientHeight;
            rulerV.width = rulerV.clientWidth;
            rulerV.height = rulerV.clientHeight;

            const ctxH = rulerH.getContext('2d');
            const ctxV = rulerV.getContext('2d');

            ctxH.clearRect(0, 0, rulerH.width, rulerH.height);
            ctxV.clearRect(0, 0, rulerV.width, rulerV.height);

            // Adjust step size and font size based on zoom level
            let stepBoard = 100;
            let fontSize = 10;
            
            if (zoomLevel < 0.1) {
                stepBoard = 1000; // Much larger steps when zoomed out far
                fontSize = 14; // Larger font
            } else if (zoomLevel < 0.3) {
                stepBoard = 500; // Larger steps
                fontSize = 12; // Slightly larger font
            } else if (zoomLevel < 0.5) {
                stepBoard = 200; // Medium steps
                fontSize = 11; // Medium font
            }

            ctxH.fillStyle = textColor;
            ctxH.strokeStyle = tickColor;
            ctxH.font = `${fontSize}px Inter, sans-serif`;
            ctxH.textAlign = 'center';
            ctxH.textBaseline = 'top';

            ctxV.fillStyle = textColor;
            ctxV.strokeStyle = tickColor;
            ctxV.font = `${fontSize}px Inter, sans-serif`;
            ctxV.textAlign = 'right';
            ctxV.textBaseline = 'middle'; 
            
            // Draw Horizontal
            let startBoardX = Math.floor(-panX / (stepBoard * zoomLevel)) * stepBoard;
            ctxH.beginPath();
            for (let bx = startBoardX; ; bx += stepBoard) {
                let sx = panX + bx * zoomLevel;
                if (sx > rulerH.width) break;
                
                ctxH.fillText(bx, sx + 2, 2);
                ctxH.moveTo(sx, 12);
                ctxH.lineTo(sx, 20);
                
                for(let j=1; j<10; j++){
                    let subBx = bx + j*10;
                    let subSx = panX + subBx * zoomLevel;
                    if(subSx > rulerH.width) break;
                    if(subSx >= 0) {
                        ctxH.moveTo(subSx, j===5 ? 15 : 18);
                        ctxH.lineTo(subSx, 20);
                    }
                }
            }
            ctxH.stroke();

            // Draw Vertical
            let startBoardY = Math.floor(-panY / (stepBoard * zoomLevel)) * stepBoard;
            ctxV.beginPath();
            for (let by = startBoardY; ; by += stepBoard) {
                let sy = panY + by * zoomLevel;
                if (sy > rulerV.height) break;
                
                ctxV.save();
                ctxV.translate(8, sy);
                ctxV.rotate(-Math.PI / 2);
                ctxV.fillText(by, 0, 0);
                ctxV.restore();
                
                ctxV.moveTo(12, sy);
                ctxV.lineTo(20, sy);
                
                for(let j=1; j<10; j++){
                    let subBy = by + j*10;
                    let subSy = panY + subBy * zoomLevel;
                    if(subSy > rulerV.height) break;
                    if(subSy >= 0) {
                        ctxV.moveTo(j===5 ? 15 : 18, subSy);
                        ctxV.lineTo(20, subSy);
                    }
                }
            }
            ctxV.stroke();
        }
        
        // --- RULER GUIDES LOGIC ---
        function setupRulerInteraction() {
            const rulerH = document.getElementById('ruler-h');
            const rulerV = document.getElementById('ruler-v');
            
            if(rulerH) {
                const startDragH = (e) => {
                    if (e.type === 'mousedown' && e.button !== 0) return; // Hanya klik kiri
                    e.preventDefault();
                    e.stopPropagation(); // Mencegah trigger Block Selection (Marquee)
                    const pos = getPointerPos(e);
                    horizontalGuides.push(pos.y);
                    isDraggingGuide = true;
                    draggedGuideType = 'horizontal';
                    draggedGuideIndex = horizontalGuides.length - 1;
                    renderGuides();
                };
                rulerH.addEventListener('mousedown', startDragH);
                rulerH.addEventListener('touchstart', startDragH, {passive: false});
            }
            
            if(rulerV) {
                const startDragV = (e) => {
                    if (e.type === 'mousedown' && e.button !== 0) return;
                    e.preventDefault();
                    e.stopPropagation(); // Mencegah trigger Block Selection (Marquee)
                    const pos = getPointerPos(e);
                    verticalGuides.push(pos.x);
                    isDraggingGuide = true;
                    draggedGuideType = 'vertical';
                    draggedGuideIndex = verticalGuides.length - 1;
                    renderGuides();
                };

        // --- SCRUBBER LOGIC (Drag to slide numbers) ---
        function initScrubbers() {
            makeScrubbable('prop-x', 'x', false, true);
            makeScrubbable('prop-y', 'y', false, true);
            makeScrubbable('prop-w', 'w', false, true);
            makeScrubbable('prop-h', 'h', false, true);

            makeScrubbable('prop-text-size', 'size', false, false);
            makeScrubbable('prop-text-line-height', 'lineHeight', true, false);
            makeScrubbable('prop-text-spacing', 'spacing', true, false);
            makeScrubbable('prop-text-word-spacing', 'wordSpacing', true, false);
            makeScrubbable('prop-stroke-width', 'strokeWidth', false, false);
            makeScrubbable('prop-opacity', 'opacity', false, false);
            makeScrubbable('prop-fill-opacity', 'fillOpacity', false, false);
        }

        function makeScrubbable(inputId, propType, isFloat = false, isTransform = false) {
            const input = document.getElementById(inputId);
            if(!input) return;
            const wrapper = input.parentElement; 
            
            wrapper.style.cursor = 'ew-resize';
            input.style.cursor = 'ew-resize';
            
            let isDragging = false;
            let startX = 0;
            let startVal = 0;
            let hasDragged = false;

            wrapper.addEventListener('mousedown', (e) => {
                isDragging = true;
                hasDragged = false;
                startX = e.clientX;
                startVal = parseFloat(input.value) || 0;
                document.body.style.cursor = 'ew-resize';
                document.body.style.userSelect = 'none'; 
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                if (!hasDragged && Math.abs(e.clientX - startX) > 2) {
                    hasDragged = true;
                    input.blur(); 
                }

                if (hasDragged) {
                    window.getSelection().removeAllRanges(); 
                    const dx = e.clientX - startX;
                    const sensitivity = isFloat ? 0.05 : 0.5; 
                    let newVal = startVal + (dx * sensitivity);
                    
                    if (!isFloat) newVal = Math.round(newVal);
                    
                    if (inputId === 'prop-text-size' || inputId === 'text-size') newVal = Math.max(1, newVal);
                    if (inputId === 'prop-stroke-width') newVal = Math.max(0, Math.min(100, newVal));
                    if (inputId === 'prop-radius') newVal = Math.max(0, newVal);
                    if (inputId === 'prop-opacity' || inputId === 'prop-fill-opacity') newVal = Math.max(0, Math.min(100, newVal));
                    
                    input.value = isFloat ? newVal.toFixed(1) : newVal;
                    
                    if (isTransform) {
                        applyTransformToSelection(propType, input.value, false);
                    } else if (propType === 'strokeWidth' || propType === 'opacity' || propType === 'fillOpacity') {
                        applyFormatToSelection(propType, input.value, false);
                    } else {
                        applyTextFormat(propType, input.value, false);
                    }
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (isDragging) {
                    isDragging = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    if (hasDragged) {
                        if (isTransform) applyTransformToSelection(propType, input.value, true);
                        else if (propType === 'strokeWidth' || propType === 'opacity' || propType === 'fillOpacity') applyFormatToSelection(propType, input.value, true);
                        else applyTextFormat(propType, input.value, true);
                    } else {
                        if (e.target === input) input.focus();
                    }
                }
            });

            input.addEventListener('change', () => {
                if (isTransform) applyTransformToSelection(propType, input.value, true);
                else if (propType === 'strokeWidth' || propType === 'opacity' || propType === 'fillOpacity') applyFormatToSelection(propType, input.value, true);
                else applyTextFormat(propType, input.value, true);
            });
            
            input.addEventListener('click', (e) => {
                if(hasDragged) e.preventDefault();
            });
        }

        // --- Auto Reparenting Logic ---
        function checkAndReparent(el) {
            if (el.dataset.type === 'frame') return; 

            const elRect = el.getBoundingClientRect();
            const elCenter = { x: elRect.left + elRect.width/2, y: elRect.top + elRect.height/2 };
            
            const frames = Array.from(document.querySelectorAll('.element-container[data-type="frame"]'))
                .filter(f => f.id !== el.id && !f.contains(el) && f.dataset.hidden !== 'true');
            
            let targetFrame = null;
            for (let i = frames.length - 1; i >= 0; i--) {
                const fRect = frames[i].getBoundingClientRect();
                if (elCenter.x >= fRect.left && elCenter.x <= fRect.right &&
                    elCenter.y >= fRect.top && elCenter.y <= fRect.bottom) {
                    targetFrame = frames[i];
                    break;
                }
            }

            if (targetFrame) {
                const frameContent = targetFrame.querySelector('.frame-content');
                if (el.parentElement !== frameContent) {
                    const fcRect = frameContent.getBoundingClientRect();
                    const relLeft = (elRect.left - fcRect.left) / zoomLevel;
                    const relTop = (elRect.top - fcRect.top) / zoomLevel;
                    
                    frameContent.appendChild(el);
                    el.style.left = relLeft + 'px';
                    el.style.top = relTop + 'px';
                }
            } else {
                if (el.parentElement !== imageLayer) {
                    const boardRect = imageLayer.getBoundingClientRect();
                    const relLeft = (elRect.left - boardRect.left) / zoomLevel;
                    const relTop = (elRect.top - boardRect.top) / zoomLevel;
                    
                    imageLayer.appendChild(el);
                    el.style.left = relLeft + 'px';
                    el.style.top = relTop + 'px';
                }
            }
        }

        function createNewProject(title = "Projek Baru", isInitial = false) {
            const newId = 'proj-' + Date.now();
            const proj = {
                id: newId,
                title: title,
                state: { images: [], connections: [], canvas: null },
                undoStack: [],
                redoStack: [],
                panX: (workspace.clientWidth - BOARD_SIZE) / 2,
                panY: (workspace.clientHeight - BOARD_SIZE) / 2,
                zoomLevel: 1,
                fileHandle: null
            };
            projects.push(proj);
            switchProject(newId);

        function switchProject(id) {
            if (activeProjectId) {
                const activeProj = projects.find(p => p.id === activeProjectId);
                if (activeProj) {
                    activeProj.state = getState();
                    activeProj.undoStack = undoStack;
                    activeProj.redoStack = redoStack;
                    activeProj.panX = panX;
                    activeProj.panY = panY;
                    activeProj.zoomLevel = zoomLevel;
                }
            }

            activeProjectId = id;
            const newProj = projects.find(p => p.id === id);

            undoStack = newProj.undoStack || [];
            redoStack = newProj.redoStack || [];
            panX = newProj.panX;
            panY = newProj.panY;
            zoomLevel = newProj.zoomLevel;

            clearSelection();

            if (!newProj.state.canvas && newProj.state.images.length === 0 && newProj.undoStack.length === 0) {
                if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
                imageLayer.innerHTML = '';
                connections = [];
                renderConnections();
                renderLayers();
                saveState(); 
            } else {
                loadState(newProj.state);
            }

            updateBoardTransform();
            renderTabs();
            updateUndoRedoUI();
            updateCanvasContext();
        }

        function closeProject(e, id) {
            e.stopPropagation();
            if (projects.length === 1) {
                projects = [];
                createNewProject("Projek Baru", true);
                return;
            }
            
            const idx = projects.findIndex(p => p.id === id);
            projects.splice(idx, 1);

            if (activeProjectId === id) {
                const nextId = projects[Math.max(0, idx - 1)].id;
                switchProject(nextId);
            } else {
                renderTabs();
            }
        }

            }
        }
