  <!-- Main Layout -->
  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- Sidebar Kalender / Balapan (Responsive: Off-canvas on Mobile) -->

  <!-- Modal Layout Sirkuit Fullscreen -->
  <div id="circuit-modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col items-center justify-center p-4 sm:p-6 md:p-12 backdrop-blur-md opacity-0 transition-opacity duration-300">
    <button onclick="closeCircuitModal()" class="absolute top-4 right-4 sm:top-6 sm:right-6 text-white bg-white/10 hover:bg-red-600 p-2 sm:p-3 rounded-full transition-all duration-300 z-10 shadow-lg">
      <i data-lucide="x" class="w-5 h-5 sm:w-6 sm:h-6"></i>
    </button>
    <h3 id="modal-circuit-name" class="text-white text-2xl sm:text-3xl md:text-5xl font-black italic uppercase tracking-widest mb-6 sm:mb-10 drop-shadow-2xl text-center"></h3>
    <img id="modal-circuit-img" src="" class="max-w-full max-h-[60vh] sm:max-h-[75vh] object-contain rounded-xl sm:rounded-2xl drop-shadow-[0_0_40px_rgba(255,255,255,0.15)]" />
  </div>

  <!-- Modal Breakdown Poin -->
  <div id="breakdown-modal" class="fixed inset-0 z-[110] bg-black/80 hidden flex-col items-center justify-center p-4 md:p-8 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="glass-panel w-full max-w-4xl max-h-[90vh] flex flex-col rounded-2xl sm:rounded-3xl overflow-hidden border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative bg-neutral-900/90">
      <button onclick="closeBreakdownModal()" class="absolute top-3 right-3 sm:top-5 sm:right-5 text-gray-400 hover:text-white bg-white/5 hover:bg-red-600 p-2 sm:p-2.5 rounded-full transition-all duration-300 z-20">
        <i data-lucide="x" class="w-4 h-4 sm:w-5 sm:h-5"></i>
      </button>
      
      <div id="breakdown-header" class="p-5 sm:p-6 md:p-8 border-b border-white/5 bg-gradient-to-r from-neutral-900 to-neutral-950 shrink-0 relative z-10">
        <!-- Generated via JS -->
      </div>
      
      <div class="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-6 md:p-8">
        <div id="breakdown-content">
          <!-- Generated via JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Aplikasi Logic -->
  <script>
    // --- ADVANCED CACHING SYSTEM: INDEXEDDB (30 DAYS PERSISTENCE) ---
    const CACHE_TTL = 30 * 24 * 60 * 60 * 1000; 

    let dbInstance = null;
    const initDB = () => {
        return new Promise((resolve, reject) => {
            if (dbInstance) return resolve(dbInstance);
            const req = indexedDB.open('OpenF1CacheDB', 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('responses')) {
                    db.createObjectStore('responses', { keyPath: 'url' });
                }
            };
            req.onsuccess = (e) => {
                dbInstance = e.target.result;
                resolve(dbInstance);
            };
            req.onerror = (e) => {
                console.warn('IndexedDB failed to open, fallback to RAM cache.', e);
                resolve(null);
            };
        });
    };

    async function getCache(url) {
        const db = await initDB();
        if (!db) return null;
        return new Promise((resolve) => {
            try {
                const tx = db.transaction('responses', 'readonly');
                const store = tx.objectStore('responses');
                const req = store.get(url);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            } catch(e) { resolve(null); }
        });
    }

    async function setCache(url, data) {
        const db = await initDB();
        if (!db) return;
        return new Promise((resolve) => {
            try {
                const tx = db.transaction('responses', 'readwrite');
                const store = tx.objectStore('responses');
                store.put({ url, data, timestamp: Date.now() });
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            } catch(e) { resolve(); }
        });
    }

    const memoryCache = new Map(); 

    // Helper Mobile Sidebar
    function toggleMobileSidebar(forceState) {
        const sidebar = document.getElementById('main-sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (!sidebar || !backdrop) return;
        
        const isOpen = !sidebar.classList.contains('-translate-x-full');
        const willOpen = forceState !== undefined ? forceState : !isOpen;
        
        if (willOpen) {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
            setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
        } else {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('opacity-0');
            setTimeout(() => backdrop.classList.add('hidden'), 300);
        }
    }

    // Helper Pembersihan DOM Zombie Replay
    function cleanupReplayContainer() {
      const zombieContainer = document.getElementById('replay-container');
      if (zombieContainer && zombieContainer.parentNode === document.body) {
          zombieContainer.remove();
      }
      document.body.style.overflow = '';
      if (state.replay.animationId) {
          cancelAnimationFrame(state.replay.animationId);
          state.replay.animationId = null;
      }
    }

    async function fetchCached(url, retries = 3, delay = 1500) {
      const now = Date.now();
      
      if (memoryCache.has(url)) {
        const cached = memoryCache.get(url);
        if (now - cached.timestamp < CACHE_TTL) return cached.data;
      }

      const dbCached = await getCache(url);
      if (dbCached && (now - dbCached.timestamp < CACHE_TTL)) {
          memoryCache.set(url, { timestamp: dbCached.timestamp, data: dbCached.data }); 
          return dbCached.data;
      }
      
      try {
        const res = await fetch(url);
        const isCsv = url.includes('csv=true');
        
        if (!res.ok) {
           if (res.status === 404 || res.status === 204) return isCsv ? "" : []; 
           if (res.status === 429) {
               if (retries > 0) {
                   console.warn(`Rate limited (429) on ${url}. Retrying in ${delay}ms...`);
                   await new Promise(resolve => setTimeout(resolve, delay));
                   return fetchCached(url, retries - 1, delay * 1.5); 
               }
               throw new Error("Terlalu banyak permintaan (Rate Limited). Server OpenF1 sedang sibuk.");
           }
           if (res.status === 422) {
               throw new Error("Data terlalu besar (422 Unprocessable Entity).");
           }
           throw new Error(`HTTP Error: ${res.status}`);
        }
        
        const textData = await res.text();
        if (!textData) return isCsv ? "" : [];
        
        const data = isCsv ? textData : JSON.parse(textData);
        
        memoryCache.set(url, { timestamp: now, data });
        await setCache(url, data);

        return data;
      } catch (err) {
        throw err;
      }
    }

    // --- STATE MANAGEMENT ---
    const state = {
      tab: 'calendar', 
      standingsMode: 'drivers', 
      year: new Date().getFullYear(),
      meetings: [],
      selectedMeeting: null,
      sessions: [],
      selectedSession: null,
      drivers: [],
      positions: {},
      intervals: {},
      standings: {}, 
      viewMode: 'grid', 
      replay: {
         dataByDriver: {}, trackPoints: [], trackBgCanvas: null,
         lapsData: [], positionsData: {}, stintsData: {}, intervalsData: {}, totalLaps: 0,
         scale: 1, offsetX: 0, offsetY: 0,
         zoom: 1, panX: 0, panY: 0,
         minX: 0, maxX: 0, minY: 0, maxY: 0, 
         startTime: 0, endTime: 0, currentTime: 0,
         loadedUntil: 0, isBuffering: false, 
         isPlaying: false, loading: false, error: null, animationId: null,
         playbackSpeed: 1, isFullscreen: false
      },
      loading: { meetings: false, sessions: false, drivers: false, positions: false, standings: false },
      error: null
    };

    // --- DOM ELEMENTS ---
    const elYearSelector = document.getElementById('year-selector');
    const elMeetingsList = document.getElementById('meetings-list');
    const elMainContent = document.getElementById('main-content');
    const elSidebarTitle = document.getElementById('sidebar-title');

    // --- UTILS ---
    const getTeamColor = (hex) => hex ? `#${hex}` : '#525252';
    
    // Convert 1col small thumbnail to 2col HD image
    const getHighResPhotoUrl = (url) => url ? url.replace('1col', '2col') : 'https://media.formula1.com/d_driver_fallback_image.png';

    const getCircuitLayoutUrl = (countryName) => {
      const formattedName = countryName.replace(/\s+/g, '_');
      return `https://media.formula1.com/image/upload/f_auto/q_auto/v1677244985/content/dam/fom-website/2018-redesign-assets/Circuit%20maps%2016x9/${formattedName}_Circuit.png.transform/8col/image.png`;
    };

    const getPoints = (position, sessionName) => {
      if (!position || position < 1) return 0;
      const isSprint = sessionName && sessionName.toLowerCase().includes('sprint');
      if (isSprint) {
        return position <= 8 ? [8, 7, 6, 5, 4, 3, 2, 1][position - 1] : 0;
      } else {
        return position <= 10 ? [25, 18, 15, 12, 10, 8, 6, 4, 2, 1][position - 1] : 0;
      }
    };

    // --- MODALS ---
    const openCircuitModal = (imgUrl, name) => {
      const modal = document.getElementById('circuit-modal');
      document.getElementById('modal-circuit-img').src = imgUrl;
      document.getElementById('modal-circuit-name').innerText = `Sirkuit ${name}`;
      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.remove('opacity-0'), 10);
    };

    const closeCircuitModal = () => {
      const modal = document.getElementById('circuit-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 300);
    };

    const openBreakdownModal = (type, id) => {
      const modal = document.getElementById('breakdown-modal');
      const headerEl = document.getElementById('breakdown-header');
      const contentEl = document.getElementById('breakdown-content');

      let data, title, subtitle, teamColor;

      if (type === 'driver') {
        data = state.standings[state.year].drivers.find(d => d.driver_number == id);
        title = `${data.details.first_name} <span class="uppercase font-black">${data.details.last_name}</span>`;
        subtitle = `No. ${data.details.driver_number} &bull; ${data.details.team_name}`;
        teamColor = getTeamColor(data.details.team_colour);
      } else {
        data = state.standings[state.year].constructors.find(c => c.team_name === id);
        title = `<span class="uppercase font-black">${data.team_name}</span>`;
        subtitle = `Pembalap: ${data.drivers.join(', ')}`;
        teamColor = getTeamColor(data.team_colour);
      }

      headerEl.innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center gap-4 md:gap-6">
          <div class="w-3 h-12 sm:h-16 rounded-full shrink-0 hidden sm:block" style="background-color: ${teamColor}"></div>
          <div class="flex-1 text-center sm:text-left">
            <h3 class="text-2xl sm:text-3xl md:text-4xl font-black italic text-white drop-shadow-md leading-tight">${title}</h3>
            <p class="text-gray-400 font-bold mt-1.5 text-xs sm:text-sm tracking-widest uppercase">${subtitle}</p>
          </div>
          <div class="text-center sm:text-right bg-black/40 p-3 rounded-xl border border-white/5 w-full sm:w-auto">
            <div class="text-3xl sm:text-4xl font-black italic text-white leading-none">${data.points}</div>
            <div class="text-[10px] sm:text-xs text-red-500 font-black tracking-widest mt-1">TOTAL POINTS</div>
          </div>
        </div>
      `;

      if (!data.history || data.history.length === 0) {
        contentEl.innerHTML = `<div class="text-center text-gray-500 py-10 font-medium text-sm sm:text-lg">Belum ada poin yang dicetak musim ini.</div>`;
      } else {
        const sortedHistory = [...data.history].sort((a, b) => new Date(b.date) - new Date(a.date));

        contentEl.innerHTML = `
          <div class="overflow-x-auto custom-scrollbar -mx-4 sm:mx-0 px-4 sm:px-0">
            <table class="w-full text-left border-collapse min-w-[500px] sm:min-w-[600px]">
              <thead>
                <tr class="bg-black/40 text-[9px] sm:text-[10px] uppercase tracking-widest text-gray-500 border-b border-white/5">
                  <th class="p-3 sm:p-4 font-bold">Grand Prix</th>
                  <th class="p-3 sm:p-4 font-bold">Sesi</th>
                  ${type === 'constructor' ? '<th class="p-3 sm:p-4 font-bold">Pembalap</th>' : ''}
                  <th class="p-3 sm:p-4 text-center font-bold">Posisi</th>
                  <th class="p-3 sm:p-4 text-right font-bold text-red-400">Poin Didapat</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-white/5">
                ${sortedHistory.map(h => `
                  <tr class="hover:bg-white/5 transition-colors">
                    <td class="p-3 sm:p-4 font-black text-gray-200 text-base sm:text-lg uppercase italic tracking-tight">${h.meeting_name}</td>
                    <td class="p-3 sm:p-4 text-xs sm:text-sm font-bold text-gray-400">
                      <span class="${h.session_name.includes('Sprint') ? 'text-blue-400 bg-blue-400/10' : 'text-green-400 bg-green-400/10'} px-2 py-1 rounded">
                        ${h.session_name}
                      </span>
                    </td>
                    ${type === 'constructor' ? `<td class="p-3 sm:p-4 text-xs sm:text-sm font-black text-gray-300 uppercase">${h.driver_name}</td>` : ''}
                    <td class="p-3 sm:p-4 text-center font-black text-white text-lg sm:text-xl">P${h.position}</td>
                    <td class="p-3 sm:p-4 text-right">
                      <span class="inline-block bg-red-500/10 border border-red-500/20 text-red-500 font-black px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg text-base sm:text-lg">
                        +${h.points}
                      </span>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.remove('opacity-0'), 10);
      refreshIcons();
    };

    const closeBreakdownModal = () => {
      const modal = document.getElementById('breakdown-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 300);
    };

    const refreshIcons = () => {
      setTimeout(() => lucide.createIcons(), 0);
    };

    // --- JSON PARSING LOGIC (FALLBACK FOR TELEMETRY) ---
    async function handleJsonUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (state.replay.animationId) cancelAnimationFrame(state.replay.animationId);

        state.replay.loading = true;
        state.replay.error = null;
        renderMain();

        try {
            const text = await file.text();
            
            if (file.name.endsWith('.csv')) {
                Papa.parse(text, {
                    header: true, dynamicTyping: true, skipEmptyLines: true,
                    complete: function(results) {
                        processCsvFallback(results.data);
                    }
                });
                return;
            }

            const jsonData = JSON.parse(text);

            if (!jsonData.tel || !jsonData.tel.x || !jsonData.tel.y || !jsonData.tel.time) {
                throw new Error("Format JSON tidak valid. Pastikan memiliki objek 'tel' yang berisi array 'time', 'x', dan 'y'.");
            }

            const times = jsonData.tel.time;
            const xs = jsonData.tel.x;
            const ys = jsonData.tel.y;

            let driverNum = "??";
            if (jsonData.dataKey) {
                const match = jsonData.dataKey.match(/-(\d+)$/);
                if (match) driverNum = match[1];
            }

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            const dataByDriver = {};
            const trackPoints = [];

            dataByDriver[driverNum] = [];

            for (let i = 0; i < times.length; i++) {
                let x = xs[i]; let y = ys[i]; let t = times[i];
                if (x == null || y == null || t == null) continue;

                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;

                let timeMs = t * 1000;
                dataByDriver[driverNum].push({ time: timeMs, x: x, y: y });
                
                if (i % 8 === 0) trackPoints.push({ x: x, y: y, type: 'dot' });
            }

            if (dataByDriver[driverNum].length === 0) throw new Error("Data telemetri JSON kosong.");

            let minTime = dataByDriver[driverNum][0].time;
            let maxTime = dataByDriver[driverNum][dataByDriver[driverNum].length - 1].time;

            state.replay = {
                ...state.replay,
                dataByDriver,
                trackPoints, minX, maxX, minY, maxY,
                startTime: minTime,
                endTime: maxTime,
                currentTime: minTime,
                loadedUntil: maxTime, 
                isBuffering: false,
                isPlaying: false,
                loading: false,
                error: null,
                zoom: 1, panX: 0, panY: 0,
                lapsData: [], positionsData: {}, stintsData: {}, intervalsData: {}, totalLaps: 0
            };

            renderMain();
            setTimeout(initReplayCanvas, 100);

        } catch(err) {
            state.replay.error = err.message;
            state.replay.loading = false;
            renderMain();
        }
    }

    function processCsvFallback(trackData) {
        if (trackData.length === 0) {
            state.replay.error = "File CSV Kosong.";
            state.replay.loading = false;
            renderMain();
            return;
        }

        let timeKey = trackData[0].hasOwnProperty('Date') ? 'Date' : (trackData[0].hasOwnProperty('Time') ? 'Time' : 'date');
        let driverKey = trackData[0].hasOwnProperty('Driver') ? 'Driver' : (trackData[0].hasOwnProperty('driver_number') ? 'driver_number' : null);
        let xKey = trackData[0].hasOwnProperty('X') ? 'X' : 'x';
        let yKey = trackData[0].hasOwnProperty('Y') ? 'Y' : 'y';

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        const dataByDriver = {};
        const trackPoints = [];

        trackData.forEach((d, i) => {
            let x = d[xKey]; let y = d[yKey]; let drv = d[driverKey]; let t = d[timeKey];
            if (x == null || y == null || drv == null || t == null) return;

            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;

            if (!dataByDriver[drv]) dataByDriver[drv] = [];
            
            let timeMs;
            if (typeof t === 'string' && t.includes('0 days')) {
                const timeMatch = t.match(/(\d+):(\d+):(\d+\.?\d*)/);
                if (timeMatch) timeMs = (parseInt(timeMatch[1])*3600 + parseInt(timeMatch[2])*60 + parseFloat(timeMatch[3])) * 1000;
                else timeMs = new Date(t).getTime();
            } else {
                timeMs = new Date(t).getTime() || parseFloat(t) * 1000; 
            }

            dataByDriver[drv].push({ time: timeMs, x: x, y: y });
            if (i % 8 === 0) trackPoints.push({ x: x, y: y, type: 'dot' });
        });

        let minTime = Infinity, maxTime = -Infinity;
        Object.keys(dataByDriver).forEach(drv => {
            dataByDriver[drv].sort((a,b) => a.time - b.time);
            if (dataByDriver[drv].length > 0) {
                if (dataByDriver[drv][0].time < minTime) minTime = dataByDriver[drv][0].time;
                if (dataByDriver[drv][dataByDriver[drv].length-1].time > maxTime) maxTime = dataByDriver[drv][dataByDriver[drv].length-1].time;
            }
        });

        state.replay = {
            ...state.replay,
            dataByDriver,
            trackPoints, minX, maxX, minY, maxY,
            startTime: minTime,
            endTime: maxTime,
            currentTime: minTime,
            loadedUntil: maxTime,
            isPlaying: false,
            loading: false,
            error: null,
            zoom: 1, panX: 0, panY: 0,
            lapsData: [], positionsData: {}, stintsData: {}, intervalsData: {}, totalLaps: 0
        };

        renderMain();
        setTimeout(initReplayCanvas, 100);
    }

    // --- REPLAY SYSTEM LOGIC (CHUNKED CSV FETCH) ---
    async function loadReplayData() {
      if (!state.selectedSession) return;
      
      state.replay.loading = true;
      state.replay.error = null;
      renderMain(); 

      try {
        const sessionKey = state.selectedSession.session_key;
        
        const startTimeMs = new Date(state.selectedSession.date_start).getTime();
        let endTimeMs = startTimeMs + (2 * 60 * 60 * 1000); 
        if (state.selectedSession.date_end) {
            endTimeMs = new Date(state.selectedSession.date_end).getTime();
        }

        let lapsData = [];
        let totalLaps = 0;
        let trackPoints = [];
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;

        try {
            lapsData = await fetchCached(`https://api.openf1.org/v1/laps?session_key=${sessionKey}`);
            const validLaps = lapsData.filter(l => l.lap_duration != null);
            if (validLaps.length > 0) totalLaps = Math.max(...validLaps.map(l => l.lap_number));
            
            if (validLaps.length > 0) {
                validLaps.sort((a,b) => a.lap_duration - b.lap_duration);
                const fastestLap = validLaps[0];
                const lapStartIso = new Date(fastestLap.date_start).toISOString();
                const lapEndIso = new Date(new Date(fastestLap.date_start).getTime() + fastestLap.lap_duration * 1000).toISOString();
                
                const trackData = await fetchCached(`https://api.openf1.org/v1/location?session_key=${sessionKey}&driver_number=${fastestLap.driver_number}&date>=${lapStartIso}&date<=${lapEndIso}`);
                
                trackData.forEach(d => {
                    if (d.x < minX) minX = d.x; if (d.x > maxX) maxX = d.x;
                    if (d.y < minY) minY = d.y; if (d.y > maxY) maxY = d.y;
                    trackPoints.push({ x: d.x, y: d.y, type: 'line' });
                });
            }
        } catch (e) {}

        const stintsRaw = await fetchCached(`https://api.openf1.org/v1/stints?session_key=${sessionKey}`);
        const stintsData = {};
        if (stintsRaw && stintsRaw.length > 0) {
            stintsRaw.forEach(s => {
                if(!stintsData[s.driver_number]) stintsData[s.driver_number] = [];
                stintsData[s.driver_number].push(s);
            });
        }

        const posRaw = await fetchCached(`https://api.openf1.org/v1/position?session_key=${sessionKey}`);
        const positionsData = {};
        if (posRaw && posRaw.length > 0) {
            posRaw.forEach(p => {
                if(!positionsData[p.driver_number]) positionsData[p.driver_number] = [];
                positionsData[p.driver_number].push({ time: new Date(p.date).getTime(), position: p.position });
            });
            Object.values(positionsData).forEach(arr => arr.sort((a,b)=>a.time - b.time));
        }

        const intRaw = await fetchCached(`https://api.openf1.org/v1/intervals?session_key=${sessionKey}`);
        const intervalsData = {};
        if (intRaw && intRaw.length > 0) {
            intRaw.forEach(i => {
                if(!intervalsData[i.driver_number]) intervalsData[i.driver_number] = [];
                intervalsData[i.driver_number].push({ 
                    time: new Date(i.date).getTime(), 
                    gap: i.gap_to_leader !== null ? `+${i.gap_to_leader}s` : (i.interval !== null ? `+${i.interval}s` : '')
                });
            });
            Object.values(intervalsData).forEach(arr => arr.sort((a,b)=>a.time - b.time));
        }

        const chunkDuration = 15 * 60 * 1000; 
        const dataByDriver = {};
        let referenceDriverForTrack = null;
        
        const totalChunks = Math.ceil((endTimeMs - startTimeMs) / chunkDuration);
        
        for (let i = 0; i < totalChunks; i++) {
            const cStart = startTimeMs + (i * chunkDuration);
            const cEnd = Math.min(cStart + chunkDuration, endTimeMs);
            const startIso = new Date(cStart).toISOString();
            const endIso = new Date(cEnd).toISOString();
            
            const progressBar = document.getElementById('replay-loading-bar');
            const progressText = document.getElementById('replay-loading-progress');
            const pct = Math.round(((i + 1) / totalChunks) * 100);
            
            if (progressBar) progressBar.style.width = `${pct}%`;
            if (progressText) progressText.innerText = `Menarik Potongan Data ${i + 1} dari ${totalChunks} (${pct}%)`;
            
            const csvUrl = `https://api.openf1.org/v1/location?session_key=${sessionKey}&date>=${startIso}&date<${endIso}&csv=true`;
            
            try {
                const csvText = await fetchCached(csvUrl);
                if (csvText && csvText.trim() !== '') {
                    const results = Papa.parse(csvText, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true
                    });
                    
                    results.data.forEach((d, idx) => {
                        let x = d.x; let y = d.y; let drv = d.driver_number; let t = d.date;

                        if (x == null || y == null || drv == null || t == null) return;

                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        
                        if (!dataByDriver[drv]) dataByDriver[drv] = [];
                        dataByDriver[drv].push({ time: new Date(t).getTime(), x: x, y: y });

                        if (trackPoints.length === 0) {
                            if (!referenceDriverForTrack) referenceDriverForTrack = drv;
                            if (drv === referenceDriverForTrack && idx % 8 === 0) {
                                trackPoints.push({ x: x, y: y, type: 'dot' });
                            }
                        }
                    });
                }
            } catch(e) {
                console.warn(`Chunk ${i} gagal dimuat:`, e);
            }
        }
        
        if (Object.keys(dataByDriver).length === 0) {
            throw new Error("Data telemetri CSV kosong atau belum tersedia dari FIA.");
        }

        let globalStart = Infinity;
        let globalEnd = -Infinity;

        Object.keys(dataByDriver).forEach(drv => {
            dataByDriver[drv].sort((a,b) => a.time - b.time);
            if (dataByDriver[drv].length > 0) {
                if (dataByDriver[drv][0].time < globalStart) globalStart = dataByDriver[drv][0].time;
                if (dataByDriver[drv][dataByDriver[drv].length - 1].time > globalEnd) globalEnd = dataByDriver[drv][dataByDriver[drv].length - 1].time;
            }
        });

        state.replay = {
            ...state.replay,
            dataByDriver,
            trackPoints, minX, maxX, minY, maxY,
            lapsData, positionsData, stintsData, intervalsData, totalLaps,
            startTime: globalStart,
            endTime: globalEnd,
            currentTime: globalStart,
            isPlaying: false,
            loading: false,
            error: null,
            zoom: 1, panX: 0, panY: 0
        };

        renderMain();
        setTimeout(initReplayCanvas, 100);

      } catch (err) {
         state.replay.error = err.message;
         state.replay.loading = false;
         renderMain();
      }
    }

    function initReplayCanvas() {
      const canvas = document.getElementById('replay-canvas');
      const container = document.getElementById('replay-container');
      if (!canvas || !container) return;

      if (state.replay.isFullscreen && container.parentNode !== document.body) {
          const placeholder = document.createElement('div');
          placeholder.id = 'replay-placeholder';
          container.parentNode.insertBefore(placeholder, container);
          document.body.appendChild(container);
      }

      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight || 500;
      
      const ctx = canvas.getContext('2d');
      const rState = state.replay;

      const padding = window.innerWidth > 640 ? 60 : 30;
      const lbOffset = window.innerWidth > 640 ? 270 : 160; 
      const width = canvas.width - padding * 2 - lbOffset;
      const height = canvas.height - padding * 2;
      
      const trackWidth = rState.maxX - rState.minX;
      const trackHeight = rState.maxY - rState.minY;
      
      const scale = Math.min(width / trackWidth, height / trackHeight);
      const offsetX = padding + lbOffset + (width - trackWidth * scale) / 2;
      const offsetY = padding + (height - trackHeight * scale) / 2;

      const trackBg = document.createElement('canvas');
      trackBg.width = canvas.width;
      trackBg.height = canvas.height;
      const bgCtx = trackBg.getContext('2d');
      
      bgCtx.strokeStyle = '#52525b';
      bgCtx.fillStyle = '#52525b';
      bgCtx.lineWidth = window.innerWidth > 640 ? 4 : 2;
      bgCtx.lineCap = 'round';
      bgCtx.lineJoin = 'round';
      
      if (rState.trackPoints.length > 0) {
          if (rState.trackPoints[0].type === 'line') {
              bgCtx.beginPath();
              rState.trackPoints.forEach((pos, i) => {
                  const cx = offsetX + (pos.x - rState.minX) * scale;
                  const cy = offsetY + (rState.maxY - pos.y) * scale;
                  if (i === 0) bgCtx.moveTo(cx, cy);
                  else bgCtx.lineTo(cx, cy);
              });
              bgCtx.stroke();
          } else {
              rState.trackPoints.forEach((pos) => {
                  const cx = offsetX + (pos.x - rState.minX) * scale;
                  const cy = offsetY + (rState.maxY - pos.y) * scale;
                  bgCtx.beginPath();
                  bgCtx.arc(cx, cy, 2, 0, Math.PI * 2);
                  bgCtx.fill();
              });
          }
      }

      rState.trackBgCanvas = trackBg;
      rState.scale = scale;
      rState.offsetX = offsetX;
      rState.offsetY = offsetY;

      // Event Listeners for Pan & Zoom (Mouse & Touch)
      canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          const zoomIntensity = 0.1;
          const delta = e.deltaY < 0 ? 1 + zoomIntensity : 1 - zoomIntensity;
          
          let newZoom = rState.zoom * delta;
          newZoom = Math.max(0.5, Math.min(newZoom, 15)); // Limit zoom dari 0.5x sampai 15x

          const canvasX = (mouseX - rState.panX) / rState.zoom;
          const canvasY = (mouseY - rState.panY) / rState.zoom;

          rState.panX = mouseX - canvasX * newZoom;
          rState.panY = mouseY - canvasY * newZoom;
          rState.zoom = newZoom;

          if (!rState.isPlaying) drawCanvas(ctx, canvas);
      }, { passive: false });

      let isDragging = false;
      let lastX = 0;
      let lastY = 0;
      let initialPinchDist = 0;
      let initialZoom = 1;
      let pinchCenterX = 0;
      let pinchCenterY = 0;

      canvas.addEventListener('mousedown', (e) => {
          if (e.button === 1 || e.button === 0) { // Middle click atau Left Click buat geser
              isDragging = true;
              lastX = e.clientX;
              lastY = e.clientY;
              canvas.style.cursor = 'grabbing';
          }
      });

      canvas.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          rState.panX += e.clientX - lastX;
          rState.panY += e.clientY - lastY;
          lastX = e.clientX;
          lastY = e.clientY;
          if (!rState.isPlaying) drawCanvas(ctx, canvas);
      });

      const stopDrag = () => { 
          isDragging = false; 
          canvas.style.cursor = 'grab';
      };
      canvas.addEventListener('mouseup', stopDrag);
      canvas.addEventListener('mouseleave', stopDrag);

      canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
              isDragging = true;
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
              isDragging = false;
              const t1 = e.touches[0];
              const t2 = e.touches[1];
              initialPinchDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
              initialZoom = rState.zoom;
              pinchCenterX = (t1.clientX + t2.clientX) / 2;
              pinchCenterY = (t1.clientY + t2.clientY) / 2;
          }
      }, { passive: false });

      canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          if (e.touches.length === 1 && isDragging) {
              rState.panX += e.touches[0].clientX - lastX;
              rState.panY += e.touches[0].clientY - lastY;
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
              const t1 = e.touches[0];
              const t2 = e.touches[1];
              const currentDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
              
              let newZoom = initialZoom * (currentDist / initialPinchDist);
              newZoom = Math.max(0.5, Math.min(newZoom, 15));

              const rect = canvas.getBoundingClientRect();
              const mouseX = pinchCenterX - rect.left;
              const mouseY = pinchCenterY - rect.top;

              const canvasX = (mouseX - rState.panX) / rState.zoom;
              const canvasY = (mouseY - rState.panY) / rState.zoom;

              rState.panX = mouseX - canvasX * newZoom;
              rState.panY = mouseY - canvasY * newZoom;
              rState.zoom = newZoom;
          }
          if (!rState.isPlaying) drawCanvas(ctx, canvas);
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
          if (e.touches.length === 0) isDragging = false;
          else if (e.touches.length === 1) {
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
              isDragging = true;
          }
      });
      canvas.addEventListener('touchcancel', () => isDragging = false);
      canvas.style.cursor = 'grab';

      let lastDrawTime = performance.now();

      function drawLoop(time) {
         if (!rState.isPlaying) {
             state.replay.animationId = requestAnimationFrame(drawLoop);
             return;
         }

         const dt = time - lastDrawTime;
         lastDrawTime = time;

         rState.currentTime += dt * rState.playbackSpeed;

         if (rState.currentTime >= rState.endTime) {
             rState.isPlaying = false; 
             rState.currentTime = rState.endTime;
             const btn = document.getElementById('btn-play-pause');
             if(btn) {
                 btn.innerHTML = '<i data-lucide="play" class="w-5 h-5 fill-current"></i>';
                 lucide.createIcons();
             }
         }

         drawCanvas(ctx, canvas);
         updateReplayUI(time);
         state.replay.animationId = requestAnimationFrame(drawLoop);
      }

      drawCanvas(ctx, canvas);
      updateReplayUI(performance.now(), true);
      state.replay.animationId = requestAnimationFrame(drawLoop);
    }

    function drawCanvas(ctx, canvas) {
      const rState = state.replay;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (rState.trackBgCanvas) {
          ctx.save();
          ctx.translate(rState.panX, rState.panY);
          ctx.scale(rState.zoom, rState.zoom);
          ctx.drawImage(rState.trackBgCanvas, 0, 0);
          ctx.restore();
      }

      const latestPos = {};
      Object.keys(rState.dataByDriver).forEach(driverNum => {
         const driverData = rState.dataByDriver[driverNum];
         if (driverData.length === 0) return;

         let left = 0; 
         let right = driverData.length - 1; 
         let prevMatch = null;
         let idx = -1;
         
         while (left <= right) {
            let mid = Math.floor((left + right) / 2);
            if (driverData[mid].time <= rState.currentTime) {
               prevMatch = driverData[mid];
               idx = mid;
               left = mid + 1;
            } else {
               right = mid - 1;
            }
         }
         
         // Interpolasi Linear (Lerp) untuk 60FPS Mulus
         if (prevMatch) {
             const nextMatch = driverData[idx + 1];
             if (nextMatch && (nextMatch.time - prevMatch.time) < 5000) { 
                 const dt = nextMatch.time - prevMatch.time;
                 const ratio = dt > 0 ? (rState.currentTime - prevMatch.time) / dt : 0;
                 latestPos[driverNum] = {
                     x: prevMatch.x + (nextMatch.x - prevMatch.x) * ratio,
                     y: prevMatch.y + (nextMatch.y - prevMatch.y) * ratio
                 };
             } else {
                 latestPos[driverNum] = prevMatch;
             }
         }
      });

      const dotRadius = window.innerWidth > 640 ? 7 : 4;

      Object.entries(latestPos).forEach(([driverNum, pos]) => {
         if (pos.x == null || pos.y == null) return;

         const driver = state.drivers.find(d => d.driver_number == driverNum);
         const teamColor = driver ? getTeamColor(driver.team_colour) : '#ffffff';
         const labelText = driver ? `${driver.name_acronym} ${driverNum}` : driverNum;

         const baseCx = rState.offsetX + (pos.x - rState.minX) * rState.scale;
         const baseCy = rState.offsetY + (rState.maxY - pos.y) * rState.scale;
         
         const cx = baseCx * rState.zoom + rState.panX;
         const cy = baseCy * rState.zoom + rState.panY;

         ctx.beginPath();
         ctx.arc(cx, cy, dotRadius, 0, 2 * Math.PI);
         ctx.fillStyle = teamColor;
         ctx.fill();
         ctx.strokeStyle = '#ffffff';
         ctx.lineWidth = window.innerWidth > 640 ? 1.5 : 1;
         ctx.stroke();

         ctx.fillStyle = '#ffffff';
         ctx.font = `bold ${window.innerWidth > 640 ? '11px' : '9px'} "Plus Jakarta Sans", sans-serif`;
         ctx.shadowColor = 'rgba(0,0,0,0.8)';
         ctx.shadowBlur = 4;
         ctx.fillText(labelText, cx + (window.innerWidth > 640 ? 10 : 6), cy + (window.innerWidth > 640 ? 4 : 3));
         ctx.shadowBlur = 0; 
      });
    }

    function toggleReplay() {
      state.replay.isPlaying = !state.replay.isPlaying;
      const btn = document.getElementById('btn-play-pause');
      if (btn) {
          btn.innerHTML = `<i data-lucide="${state.replay.isPlaying ? 'pause' : 'play'}" class="w-4 h-4 sm:w-5 sm:h-5 fill-current"></i>`;
          lucide.createIcons();
      }
    }

    function resetReplayView() {
        state.replay.zoom = 1;
        state.replay.panX = 0;
        state.replay.panY = 0;
        const canvas = document.getElementById('replay-canvas');
        if (canvas) {
            drawCanvas(canvas.getContext('2d'), canvas);
        }
    }

    function toggleFullscreenReplay() {
        const container = document.getElementById('replay-container');
        const closeBtn = document.getElementById('replay-close-fullscreen');
        const maximizeBtn = document.getElementById('replay-maximize-btn');
        const minimizeBtn = document.getElementById('replay-minimize-btn');
        const topControls = document.getElementById('replay-top-controls');
        
        if (!container) return;
        
        state.replay.isFullscreen = !state.replay.isFullscreen;
        
        if (state.replay.isFullscreen) {
            if (container.parentNode !== document.body) {
                const placeholder = document.createElement('div');
                placeholder.id = 'replay-placeholder';
                container.parentNode.insertBefore(placeholder, container);
                document.body.appendChild(container);
            }
            container.classList.remove('relative', 'rounded-3xl', 'mb-8', 'h-[60vh]', 'sm:h-[600px]', 'shadow-[0_10px_50px_rgba(0,0,0,0.5)]', 'border');
            container.classList.add('fixed', 'inset-0', 'z-[200]', 'bg-f1dark');
            document.body.style.overflow = 'hidden';
            if(closeBtn) closeBtn.classList.remove('hidden');
            if(maximizeBtn) maximizeBtn.classList.add('hidden');
            if(minimizeBtn) minimizeBtn.classList.remove('hidden');
            if(topControls) topControls.classList.add('pr-12', 'md:pr-16'); 
        } else {
            const placeholder = document.getElementById('replay-placeholder');
            if (placeholder) {
                placeholder.parentNode.insertBefore(container, placeholder);
                placeholder.remove();
            }
            container.classList.add('relative', 'rounded-3xl', 'mb-8', 'h-[60vh]', 'sm:h-[600px]', 'shadow-[0_10px_50px_rgba(0,0,0,0.5)]', 'border');
            container.classList.remove('fixed', 'inset-0', 'z-[200]', 'bg-f1dark');
            document.body.style.overflow = '';
            if(closeBtn) closeBtn.classList.add('hidden');
            if(maximizeBtn) maximizeBtn.classList.remove('hidden');
            if(minimizeBtn) minimizeBtn.classList.add('hidden');
            if(topControls) topControls.classList.remove('pr-12', 'md:pr-16');
        }

        if (state.replay.animationId) cancelAnimationFrame(state.replay.animationId);
        setTimeout(initReplayCanvas, 50);
    }

    async function seekReplay(percent) {
      if (!state.replay.startTime) return;
      const rState = state.replay;
      const totalDuration = rState.endTime - rState.startTime;
      const targetTime = rState.startTime + (totalDuration * (percent / 100));
      
      rState.currentTime = targetTime;

      const canvas = document.getElementById('replay-canvas');
      if (canvas) {
          drawCanvas(canvas.getContext('2d'), canvas);
          updateReplayUI(performance.now(), true);
      }
    }

    let lastUiUpdateTime = 0;
    function updateReplayUI(time = 0, force = false) {
      const rState = state.replay;

      const elapsed = rState.currentTime - rState.startTime;
      const hours = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
      const mins = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
      const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
      
      const timeEl = document.getElementById('replay-time');
      if(timeEl) timeEl.innerText = `${hours}:${mins}:${secs}`;
      
      const slider = document.getElementById('replay-slider');
      if(slider && rState.endTime > rState.startTime) {
          slider.value = ((rState.currentTime - rState.startTime) / (rState.endTime - rState.startTime)) * 100;
      }

      // Animasi Leaderboard di throttle tiap 500ms biar sinkron dengan CSS transition 500ms
      if (!force && time - lastUiUpdateTime < 500) return;
      lastUiUpdateTime = time;

      const lbContainer = document.getElementById('replay-leaderboard-content');
      const lapInfoElTower = document.getElementById('replay-lap-info-tower');
      const lapInfoElTop = document.getElementById('replay-lap-info');

      if (!rState.positionsData || Object.keys(rState.positionsData).length === 0) return;

      const currentBoard = [];
      let currentMaxLap = 1;

      state.drivers.forEach(d => {
         const dNum = d.driver_number;
         let livePos = 99;
         let startPos = 99;
         
         if (rState.positionsData[dNum] && rState.positionsData[dNum].length > 0) {
            const pArr = rState.positionsData[dNum];
            startPos = pArr[0].position; 
            
            let left = 0; let right = pArr.length - 1; let bestP = pArr[0]?.position || 99;
            while(left <= right){
                let mid = Math.floor((left+right)/2);
                if(pArr[mid].time <= rState.currentTime){
                    bestP = pArr[mid].position;
                    left = mid+1;
                }else{
                    right = mid-1;
                }
            }
            livePos = bestP;
         }

         let liveLap = 1;
         if (rState.lapsData) {
            const lArr = rState.lapsData.filter(l => l.driver_number == dNum);
            for(let i=0; i<lArr.length; i++) {
                const lTime = new Date(lArr[i].date_start).getTime();
                if (lTime <= rState.currentTime) liveLap = lArr[i].lap_number;
            }
         }
         if (liveLap > currentMaxLap && liveLap < 100) currentMaxLap = liveLap; 

         let tyreHistory = [];
         if (rState.stintsData[dNum]) {
            const sArr = rState.stintsData[dNum];
            tyreHistory = sArr.filter(s => s.lap_start <= liveLap).map(s => s.compound);
         }
         
         let liveGap = '';
         if (rState.intervalsData && rState.intervalsData[dNum]) {
            const iArr = rState.intervalsData[dNum];
            let left = 0; let right = iArr.length - 1; let bestGap = '';
            while(left <= right){
                let mid = Math.floor((left+right)/2);
                if(iArr[mid].time <= rState.currentTime){
                    bestGap = iArr[mid].gap;
                    left = mid+1;
                }else{
                    right = mid-1;
                }
            }
            liveGap = bestGap;
         }
         if (livePos === 1) liveGap = 'Leader'; 

         currentBoard.push({ driver: d, pos: livePos, startPos: startPos, tyres: tyreHistory, gap: liveGap });
      });

      if (lapInfoElTower) lapInfoElTower.innerText = `Lap ${currentMaxLap} / ${rState.totalLaps ? rState.totalLaps : '?'}`;
      if (lapInfoElTop) lapInfoElTop.innerText = `LAP ${currentMaxLap} / ${rState.totalLaps ? rState.totalLaps : '?'}`;

      currentBoard.sort((a,b) => a.pos - b.pos);
      
      if (lbContainer) {
         currentBoard.forEach((c, index) => {
            const rowEl = document.getElementById(`lb-row-${c.driver.driver_number}`);
            if (rowEl) {
                const displayIndex = index; 
                rowEl.style.transform = `translateY(${displayIndex * 40}px)`; 
                
                const posEl = document.getElementById(`lb-pos-${c.driver.driver_number}`);
                if (posEl) posEl.innerText = c.pos < 99 ? c.pos : '-';

                const diffEl = document.getElementById(`lb-pos-diff-${c.driver.driver_number}`);
                if (diffEl && c.pos < 99 && c.startPos < 99) {
                    const diff = c.startPos - c.pos;
                    if (diff > 0) diffEl.innerHTML = `<span class="text-green-500">▲${diff}</span>`;
                    else if (diff < 0) diffEl.innerHTML = `<span class="text-red-500">▼${Math.abs(diff)}</span>`;
                    else diffEl.innerHTML = `<span class="text-gray-600">-</span>`;
                } else if (diffEl) {
                    diffEl.innerHTML = '';
                }

                const gapEl = document.getElementById(`lb-gap-${c.driver.driver_number}`);
                if (gapEl) gapEl.innerText = c.gap || '';

                const tyreHistoryEl = document.getElementById(`lb-tyre-history-${c.driver.driver_number}`);
                const tyreCurrentEl = document.getElementById(`lb-tyre-current-${c.driver.driver_number}`);
                
                let tyColor = 'text-gray-500';
                let tyText = '?';
                if (c.tyres && c.tyres.length > 0) {
                    const currentTyre = c.tyres[c.tyres.length - 1];
                    if (currentTyre) {
                        tyText = currentTyre.substring(0,1).toUpperCase();
                        if(currentTyre === 'SOFT') tyColor = 'text-red-500';
                        else if(currentTyre === 'MEDIUM') tyColor = 'text-yellow-400';
                        else if(currentTyre === 'HARD') tyColor = 'text-white';
                        else if(currentTyre === 'INTERMEDIATE') tyColor = 'text-green-500';
                        else if(currentTyre === 'WET') tyColor = 'text-blue-500';
                    }
                }

                if (tyreCurrentEl) {
                    tyreCurrentEl.className = `sm:hidden w-4 text-right text-[10px] font-black shrink-0 ${tyColor}`;
                    tyreCurrentEl.innerText = tyText;
                }

                if (tyreHistoryEl) {
                    tyreHistoryEl.innerHTML = c.tyres.map(tyre => {
                        let hColor = 'text-gray-500';
                        let hText = '?';
                        if (tyre) {
                            hText = tyre.substring(0,1).toUpperCase();
                            if(tyre === 'SOFT') hColor = 'text-red-500';
                            else if(tyre === 'MEDIUM') hColor = 'text-yellow-400';
                            else if(tyre === 'HARD') hColor = 'text-white';
                            else if(tyre === 'INTERMEDIATE') hColor = 'text-green-500';
                            else if(tyre === 'WET') hColor = 'text-blue-500';
                        }
                        return `<span class="text-[11px] font-black ${hColor}" title="${tyre}">${hText}</span>`;
                    }).join('<span class="text-gray-600 text-[8px] mx-0.5 opacity-50">›</span>');
                }
            }
         });
      }
    }

    // --- FETCH DATA (MENGGUNAKAN CACHE) ---
    async function loadMeetings(year) {
      cleanupReplayContainer();
      state.year = year;
      state.loading.meetings = true;
      state.error = null;
      renderYearSelector();
      renderSidebar();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/meetings?year=${year}`);
        data.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
        state.meetings = data;
        
        if (data.length > 0) {
          const now = new Date();
          const pastMeetings = data.filter(m => new Date(m.date_start) <= now);
          if (pastMeetings.length > 0) {
             selectMeeting(pastMeetings[pastMeetings.length - 1]); 
          } else {
             selectMeeting(data[0]); 
          }
        } else {
          selectMeeting(null);
        }
      } catch (err) {
        state.error = err.message;
        renderSidebar();
      } finally {
        state.loading.meetings = false;
        renderSidebar();
      }
    }

    async function loadSessions() {
      if (!state.selectedMeeting) {
        state.sessions = [];
        selectSession(null);
        return;
      }
      
      state.loading.sessions = true;
      renderMain();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/sessions?meeting_key=${state.selectedMeeting.meeting_key}`);
        data.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
        state.sessions = data;
        
        if (data.length > 0) {
          selectSession(data[data.length - 1]);
        } else {
          selectSession(null);
        }
      } catch (err) {
        console.error(err);
      } finally {
        state.loading.sessions = false;
        renderMain();
      }
    }

    async function loadDrivers() {
      if (!state.selectedSession) {
        state.drivers = [];
        renderMain();
        return;
      }
      
      state.loading.drivers = true;
      renderMain();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/drivers?session_key=${state.selectedSession.session_key}`);
        
        const uniqueDrivers = [];
        const seen = new Set();
        data.forEach(d => {
          if (!seen.has(d.driver_number)) {
            seen.add(d.driver_number);
            uniqueDrivers.push(d);
          }
        });
        
        uniqueDrivers.sort((a, b) => {
          const teamA = a.team_name || '';
          const teamB = b.team_name || '';
          if (teamA < teamB) return -1;
          if (teamA > teamB) return 1;
          return a.driver_number - b.driver_number;
        });
        
        state.drivers = uniqueDrivers;
      } catch (err) {
        console.error(err);
      } finally {
        state.loading.drivers = false;
        renderMain();
      }
    }

    async function loadPositions() {
      if (!state.selectedSession) {
        state.positions = {};
        return;
      }
      
      state.loading.positions = true;
      renderMain();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/position?session_key=${state.selectedSession.session_key}`);
        const latestPos = {};
        if (data && data.length > 0) {
           data.forEach(p => {
             latestPos[p.driver_number] = p.position;
           });
        }
        state.positions = latestPos;
      } catch (err) {
        console.error(err);
      } finally {
        state.loading.positions = false;
        renderMain();
      }
    }

    async function loadIntervals() {
      if (!state.selectedSession) {
        state.intervals = {};
        return;
      }
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/intervals?session_key=${state.selectedSession.session_key}`);
        const latestIntervals = {};
        if (data && data.length > 0) {
           data.forEach(i => {
             if (i.gap_to_leader !== null) latestIntervals[i.driver_number] = `+${i.gap_to_leader}s`;
             else if (i.interval !== null) latestIntervals[i.driver_number] = `+${i.interval}s`;
           });
        }
        state.intervals = latestIntervals;
        renderMain(); 
      } catch (err) {
        console.error(err);
      }
    }

    async function loadStandingsData() {
      if (state.standings[state.year]) {
         renderStandings();
         return;
      }
      
      state.loading.standings = true;
      renderStandings();
      
      try {
        if (state.meetings.length === 0 || state.meetings[0].year !== state.year) {
            state.meetings = await fetchCached(`https://api.openf1.org/v1/meetings?year=${state.year}`);
        }

        const sessions = await fetchCached(`https://api.openf1.org/v1/sessions?year=${state.year}`);
        const now = new Date();
        const validSessions = sessions.filter(s => 
          (s.session_name === 'Race' || s.session_name.includes('Sprint')) && 
          new Date(s.date_start) < now
        );
        
        let driversMap = {};
        
        for (const s of validSessions) {
          try {
            const positions = await fetchCached(`https://api.openf1.org/v1/position?session_key=${s.session_key}`);
            if (!positions || positions.length === 0) continue;

            const meeting = state.meetings.find(m => m.meeting_key === s.meeting_key) || { meeting_name: 'Unknown GP', country_name: 'Unknown' };
            const mName = meeting.meeting_name || meeting.country_name;

            const latestPos = {};
            positions.forEach(p => { latestPos[p.driver_number] = p.position; });
            
            Object.entries(latestPos).forEach(([dNum, pos]) => {
              const pts = getPoints(pos, s.session_name);
              if (pts > 0) {
                 if (!driversMap[dNum]) driversMap[dNum] = { driver_number: dNum, points: 0, history: [] };
                 driversMap[dNum].points += pts;
                 driversMap[dNum].history.push({
                     meeting_name: mName,
                     session_name: s.session_name,
                     position: pos,
                     points: pts,
                     date: s.date_start
                 });
              }
            });
            await new Promise(r => setTimeout(r, 100)); 
          } catch (e) {}
        }
        
        let driverDetailsMap = {};
        if (validSessions.length > 0) {
          const latestSession = validSessions[validSessions.length - 1];
          try {
              const driverData = await fetchCached(`https://api.openf1.org/v1/drivers?meeting_key=${latestSession.meeting_key}`);
              if(driverData && driverData.length > 0) driverData.forEach(d => { driverDetailsMap[d.driver_number] = d; });
          } catch(e) {}
          
          const firstSession = validSessions[0];
          try {
              const driverData = await fetchCached(`https://api.openf1.org/v1/drivers?meeting_key=${firstSession.meeting_key}`);
              if(driverData && driverData.length > 0) driverData.forEach(d => { 
                  if (!driverDetailsMap[d.driver_number]) driverDetailsMap[d.driver_number] = d; 
              });
          } catch(e) {}
        }
        
        let constructorsMap = {};

        const finalDrivers = Object.values(driversMap).map(d => {
            d.details = driverDetailsMap[d.driver_number] || { 
                driver_number: d.driver_number, first_name: 'Unknown', last_name: 'Driver', name_acronym: 'UNK', team_name: 'Unknown', team_colour: '525252' 
            };
            
            const tName = d.details.team_name || 'Tim Tidak Diketahui';
            
            if (!constructorsMap[tName]) {
                constructorsMap[tName] = { team_name: tName, team_colour: d.details.team_colour, points: 0, history: [], drivers: [] };
            }
            constructorsMap[tName].points += d.points;
            
            d.history.forEach(h => {
                constructorsMap[tName].history.push({...h, driver_name: d.details.last_name});
            });
            
            if (!constructorsMap[tName].drivers.includes(d.details.last_name)) {
                constructorsMap[tName].drivers.push(d.details.last_name);
            }
            
            return d;
        }).sort((a, b) => b.points - a.points);

        const finalConstructors = Object.values(constructorsMap).sort((a, b) => b.points - a.points);

        state.standings[state.year] = {
            drivers: finalDrivers,
            constructors: finalConstructors
        };
          
      } catch (err) {
        console.error("Gagal hitung klasemen:", err);
      } finally {
        state.loading.standings = false;
        renderStandings();
      }
    }

    // --- ACTIONS ---
    function selectYear(y) {
      if (state.year === y) return;
      cleanupReplayContainer();
      state.year = y;
      
      if (state.tab === 'calendar') {
        loadMeetings(y);
      } else {
        renderYearSelector();
        loadStandingsData();
      }
    }

    function selectMeeting(meeting) {
      cleanupReplayContainer();
      state.selectedMeeting = meeting;
      toggleMobileSidebar(false); // Close sidebar on mobile after selection
      renderSidebar();
      loadSessions();
    }

    function selectSession(session) {
      cleanupReplayContainer();
      state.selectedSession = session;
      state.positions = {};
      state.intervals = {};
      
      state.replay = { 
        dataByDriver: {}, trackPoints: [], trackBgCanvas: null,
        lapsData: [], positionsData: {}, stintsData: {}, intervalsData: {}, totalLaps: 0,
        scale: 1, offsetX: 0, offsetY: 0, minX: 0, maxX: 0, minY: 0, maxY: 0, 
        zoom: 1, panX: 0, panY: 0,
        startTime: 0, endTime: 0, currentTime: 0, loadedUntil: 0, isBuffering: false, 
        isPlaying: false, loading: false, error: null, animationId: null, playbackSpeed: 1, isFullscreen: false 
      };
      
      loadDrivers();
      loadPositions();
      loadIntervals();
      if(state.viewMode === 'replay') loadReplayData();
    }

    function setViewMode(mode) {
      cleanupReplayContainer();
      state.viewMode = mode;
      
      if (mode === 'replay') {
          state.replay.isFullscreen = true;
          document.body.style.overflow = 'hidden';
      } else {
          state.replay.isFullscreen = false;
          document.body.style.overflow = '';
      }
      
      if(mode === 'replay' && Object.keys(state.replay.dataByDriver).length === 0) {
          loadReplayData();
      } else {
          renderMain();
          if(mode === 'replay') setTimeout(initReplayCanvas, 50);
      }
    }

    function setTab(tab) {
      if (state.tab === tab) return;
      cleanupReplayContainer();
      state.tab = tab;
      
      const btnCal = document.getElementById('tab-calendar');
      const btnStd = document.getElementById('tab-standings');
      const sidebar = document.getElementById('main-sidebar');
      
      if (tab === 'calendar') {
        btnCal.className = 'px-5 py-2 rounded-lg text-sm font-bold bg-gradient-to-r from-red-600 to-red-500 text-white shadow transition-all flex-1 sm:flex-none';
        btnStd.className = 'px-5 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white hover:bg-white/5 transition-all flex-1 sm:flex-none';
        
        if (sidebar) {
            sidebar.classList.remove('hidden');
            sidebar.classList.add('md:flex');
        }
        
        if (state.meetings.length === 0) loadMeetings(state.year);
        else {
           renderMain();
           if(state.viewMode === 'replay') setTimeout(initReplayCanvas, 50);
           // On mobile, if returning to calendar without selection, auto open sidebar
           if (!state.selectedMeeting && window.innerWidth < 768) {
               toggleMobileSidebar(true);
           }
        }
      } else {
        btnCal.className = 'px-5 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white hover:bg-white/5 transition-all flex-1 sm:flex-none';
        btnStd.className = 'px-5 py-2 rounded-lg text-sm font-bold bg-gradient-to-r from-red-600 to-red-500 text-white shadow transition-all flex-1 sm:flex-none';
        
        if (sidebar) {
            sidebar.classList.add('hidden');
            sidebar.classList.remove('md:flex');
            toggleMobileSidebar(false);
        }
        
        loadStandingsData();
      }
    }

    function setStandingsMode(mode) {
      state.standingsMode = mode;
      renderStandings();
    }

                      <th class="p-3 sm:p-5 font-bold">Pembalap</th>
                      <th class="p-3 sm:p-5 font-bold">Tim</th>
                      <th class="p-3 sm:p-5 text-center font-bold">Waktu/Gap</th>
                      <th class="p-3 sm:p-5 text-center font-bold text-red-400">Poin</th>
                      <th class="p-3 sm:p-5 w-16 sm:w-24 text-center font-bold">No</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-white/5">
          `;

          if (state.loading.positions) {
             html += `<tr><td colspan="6" class="p-8 sm:p-12 text-center text-gray-500 font-medium text-sm sm:text-base"><i data-lucide="loader-2" class="w-5 h-5 sm:w-6 sm:h-6 animate-spin mx-auto mb-2 sm:mb-3 text-red-500"></i> Menghitung klasemen sesi...</td></tr>`;
          } else {
             html += sorted.map(d => {
                const pos = state.positions[d.driver_number] || '-';
                const teamColor = getTeamColor(d.team_colour);
                
                const gap = state.intervals[d.driver_number] || (pos === 1 ? 'Leader' : '-');
                const points = getPoints(pos, state.selectedSession.session_name);
                
                let posStyle = 'text-white';
                if (pos === 1) posStyle = 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]';
                else if (pos === 2) posStyle = 'text-gray-300 drop-shadow-[0_0_8px_rgba(209,213,219,0.5)]';
                else if (pos === 3) posStyle = 'text-amber-600 drop-shadow-[0_0_8px_rgba(217,119,6,0.5)]';
                
                return `
                  <tr class="hover:bg-white/5 transition-colors group">
                    <td class="p-3 sm:p-5 text-center font-black text-xl sm:text-2xl ${posStyle}">${pos}</td>
                    <td class="p-3 sm:p-5">
                      <div class="flex items-center gap-3 sm:gap-4">
                        <img src="${getHighResPhotoUrl(d.headshot_url)}" class="w-10 h-10 sm:w-12 sm:h-12 object-cover rounded-full bg-black/20 border border-white/10 shrink-0" onerror="this.onerror=null; this.src='https://media.formula1.com/d_driver_fallback_image.png';" />
                        <div class="min-w-0">
                          <div class="font-bold text-base sm:text-lg text-white group-hover:text-red-400 transition-colors truncate">${d.first_name} <span class="uppercase font-black">${d.last_name}</span></div>
                          <div class="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest text-gray-500 mt-0.5">${d.name_acronym}</div>
                        </div>
                      </div>
                    </td>
                    <td class="p-3 sm:p-5">
                      <div class="flex items-center gap-2 sm:gap-3 glass-panel px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg inline-flex">
                        <div class="w-2.5 h-2.5 sm:w-3.5 sm:h-3.5 rounded-full shadow-sm shrink-0" style="background-color: ${teamColor}"></div>
                        <span class="text-xs sm:text-sm font-bold text-gray-300 truncate max-w-[80px] sm:max-w-none">${d.team_name || 'Tim Tidak Diketahui'}</span>
                      </div>
                    </td>
                    <td class="p-3 sm:p-5 text-center font-mono text-xs sm:text-sm text-gray-300">${gap}</td>
                    <td class="p-3 sm:p-5 text-center font-black text-base sm:text-lg text-red-500 bg-red-900/10 rounded">${points > 0 ? '+'+points : '-'}</td>
                    <td class="p-3 sm:p-5 text-center">
                      <span class="text-base sm:text-lg font-black italic bg-white text-black px-2 sm:px-3 py-1 sm:py-1.5 rounded shadow-sm">${d.driver_number}</span>
                    </td>
                  </tr>
                `;
             }).join('');
          }
          
          html += `
                  </tbody>
                </table>
              </div>
            </div>
          `;
        }
        
        html += `</div>`;
      }

      html += `</div></div>`;
      
      elMainContent.innerHTML = html;
      refreshIcons();
    }

    function renderStandings() {
      let html = `
        <div class="flex flex-col min-h-full bg-neutral-950 fade-in">
          <div class="p-6 sm:p-8 md:p-14 border-b border-white/5 shrink-0 bg-gradient-to-b from-neutral-900 to-neutral-950">
             <div class="flex items-center gap-4 sm:gap-5 mb-5 sm:mb-6">
                <div class="p-3 sm:p-4 bg-gradient-to-br from-red-600/30 to-red-900/30 rounded-xl sm:rounded-2xl border border-red-500/30 shadow-[0_0_20px_rgba(220,38,38,0.2)]">
                  <i data-lucide="trophy" class="w-8 h-8 sm:w-10 sm:h-10 text-red-500"></i>
                </div>
                <div>
                  <h2 class="text-3xl sm:text-4xl md:text-5xl font-black uppercase italic tracking-tight text-white drop-shadow-2xl leading-none">Klasemen</h2>
                  <p class="text-gray-400 font-medium mt-1 sm:mt-2 text-sm sm:text-lg">Akumulasi Poin Musim <span class="text-white font-bold">${state.year}</span></p>
                </div>
             </div>
             
             <!-- Toggle Driver vs Constructor -->
             <div class="flex glass-panel rounded-xl p-1 shadow-inner inline-flex border border-white/10 w-full sm:w-auto">
                <button onclick="setStandingsMode('drivers')" class="flex-1 sm:flex-none px-4 sm:px-6 py-2 sm:py-2.5 rounded-lg text-xs sm:text-sm font-bold transition-all duration-300 ${state.standingsMode === 'drivers' ? 'bg-gradient-to-r from-red-600 to-red-500 text-white shadow' : 'text-gray-500 hover:text-white hover:bg-white/5'}">
                  Pembalap
                </button>
                <button onclick="setStandingsMode('constructors')" class="flex-1 sm:flex-none px-4 sm:px-6 py-2 sm:py-2.5 rounded-lg text-xs sm:text-sm font-bold transition-all duration-300 ${state.standingsMode === 'constructors' ? 'bg-gradient-to-r from-red-600 to-red-500 text-white shadow' : 'text-gray-500 hover:text-white hover:bg-white/5'}">
                  Konstruktor
                </button>
             </div>
          </div>
          
          <div class="p-4 sm:p-6 md:p-14 pt-6 sm:pt-8">
      `;
      
      if (state.loading.standings) {
        html += `
            <div class="flex flex-col items-center justify-center h-[50vh] gap-4 sm:gap-6 text-gray-400 px-4 text-center">
              <i data-lucide="loader-2" class="w-10 h-10 sm:w-12 sm:h-12 animate-spin text-red-500"></i>
              <p class="font-medium text-base sm:text-lg animate-pulse">Menghitung akumulasi poin dari semua balapan ${state.year}...</p>
              <p class="text-xs sm:text-sm opacity-50 max-w-md">Proses ini mengambil data setiap sesi yang sudah berlalu, harap tunggu sebentar.</p>
            </div>
        `;
      } else if (!state.standings[state.year] || state.standings[state.year].drivers.length === 0) {
        html += `
            <div class="text-center py-12 sm:py-16 glass-panel rounded-2xl border-dashed border-white/10 max-w-4xl mx-auto">
              <p class="text-gray-500 font-medium text-sm sm:text-lg">Belum ada data klasemen / balapan untuk tahun ${state.year}.</p>
            </div>
        `;
      } else {
        html += `
            <div class="glass-panel rounded-2xl sm:rounded-3xl overflow-hidden border border-white/5 shadow-2xl max-w-5xl mx-auto mb-10">
              <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[500px] sm:min-w-[600px]">
                  <thead>
                    <tr class="bg-black/80 text-[10px] sm:text-xs uppercase tracking-widest text-gray-400 border-b border-white/10">
                      <th class="p-4 sm:p-6 w-16 sm:w-24 text-center font-bold">Pos</th>
                      <th class="p-4 sm:p-6 font-bold">${state.standingsMode === 'drivers' ? 'Pembalap' : 'Tim / Konstruktor'}</th>
                      <th class="p-4 sm:p-6 font-bold">${state.standingsMode === 'drivers' ? 'Tim' : 'Daftar Pembalap'}</th>
                      <th class="p-4 sm:p-6 text-center font-bold text-red-400">Total Poin</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-white/5">
        `;
        
        if (state.standingsMode === 'drivers') {
            state.standings[state.year].drivers.forEach((st, index) => {
              const d = st.details;
              const pos = index + 1;
              const teamColor = getTeamColor(d.team_colour);
              
              let posStyle = 'text-white font-black';
              if (pos === 1) posStyle = 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.6)] text-3xl sm:text-4xl font-black';
              else if (pos === 2) posStyle = 'text-gray-300 drop-shadow-[0_0_10px_rgba(209,213,219,0.5)] text-2xl sm:text-3xl font-black';
              else if (pos === 3) posStyle = 'text-amber-600 drop-shadow-[0_0_10px_rgba(217,119,6,0.5)] text-2xl sm:text-3xl font-black';
              else posStyle += ' text-xl sm:text-2xl';
              
              html += `
                <tr onclick="openBreakdownModal('driver', '${d.driver_number}')" class="hover:bg-white/5 transition-colors group cursor-pointer relative">
                  <td class="p-4 sm:p-6 text-center ${posStyle}">${pos}</td>
                  <td class="p-4 sm:p-6">
                    <div class="flex items-center gap-3 sm:gap-5">
                      <img src="${getHighResPhotoUrl(d.headshot_url)}" class="w-12 h-12 sm:w-16 sm:h-16 object-cover rounded-full bg-black/40 border-[2px] sm:border-[3px] shrink-0" style="border-color: ${teamColor}80;" onerror="this.onerror=null; this.src='https://media.formula1.com/d_driver_fallback_image.png';" />
                      <div class="min-w-0">
                        <div class="font-bold text-lg sm:text-2xl text-white group-hover:text-red-400 transition-colors truncate">${d.first_name} <span class="uppercase font-black">${d.last_name}</span></div>
                        <div class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-gray-500 mt-0.5 sm:mt-1">${d.name_acronym} <span class="opacity-50 mx-1">•</span> No. ${d.driver_number}</div>
                      </div>
                    </div>
                  </td>
                  <td class="p-4 sm:p-6">
                    <div class="flex items-center gap-2 sm:gap-3 glass-panel px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl inline-flex shadow-inner">
                      <div class="w-3 h-3 sm:w-4 sm:h-4 rounded-full shadow-sm shrink-0" style="background-color: ${teamColor}"></div>
                      <span class="text-xs sm:text-sm font-bold text-gray-300 truncate max-w-[100px] sm:max-w-none">${d.team_name || 'Tim Tidak Diketahui'}</span>
                    </div>
                  </td>
                  <td class="p-4 sm:p-6 text-center relative">
                    <div class="bg-red-500/10 border border-red-500/20 py-1.5 sm:py-2 px-2 sm:px-0 rounded-xl sm:inline-block sm:min-w-[100px] group-hover:bg-red-500/20 transition-colors">
                      <span class="text-2xl sm:text-4xl font-black italic text-white drop-shadow-md">${st.points}</span>
                      <span class="text-[10px] sm:text-xs text-red-500 font-bold ml-1">PTS</span>
                    </div>
                  </td>
                </tr>
              `;
            });
        } else {
            // Render Konstruktor
            state.standings[state.year].constructors.forEach((c, index) => {
              const pos = index + 1;
              const teamColor = getTeamColor(c.team_colour);
              
              let posStyle = 'text-white font-black';
              if (pos === 1) posStyle = 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.6)] text-3xl sm:text-4xl font-black';
              else if (pos === 2) posStyle = 'text-gray-300 drop-shadow-[0_0_10px_rgba(209,213,219,0.5)] text-2xl sm:text-3xl font-black';
              else if (pos === 3) posStyle = 'text-amber-600 drop-shadow-[0_0_10px_rgba(217,119,6,0.5)] text-2xl sm:text-3xl font-black';
              else posStyle += ' text-xl sm:text-2xl';
              
              html += `
                <tr onclick="openBreakdownModal('constructor', '${c.team_name}')" class="hover:bg-white/5 transition-colors group cursor-pointer">
                  <td class="p-4 sm:p-6 text-center ${posStyle}">${pos}</td>
                  <td class="p-4 sm:p-6">
                    <div class="flex items-center gap-3 sm:gap-5">
                      <div class="w-2.5 sm:w-3 h-10 sm:h-14 rounded-full shadow-sm shrink-0" style="background-color: ${teamColor}"></div>
                      <div class="min-w-0">
                        <div class="font-black text-lg sm:text-2xl uppercase italic text-white group-hover:text-red-400 transition-colors truncate">${c.team_name}</div>
                      </div>
                    </div>
                  </td>
                  <td class="p-4 sm:p-6">
                    <span class="text-xs sm:text-sm font-bold text-gray-400 uppercase tracking-widest truncate block max-w-[120px] sm:max-w-none">${c.drivers.join(', ')}</span>
                  </td>
                  <td class="p-4 sm:p-6 text-center">
                    <div class="bg-red-500/10 border border-red-500/20 py-1.5 sm:py-2 px-2 sm:px-0 rounded-xl sm:inline-block sm:min-w-[100px] group-hover:bg-red-500/20 transition-colors">
                      <span class="text-2xl sm:text-4xl font-black italic text-white drop-shadow-md">${c.points}</span>
                      <span class="text-[10px] sm:text-xs text-red-500 font-bold ml-1">PTS</span>
                    </div>
                  </td>
                </tr>
              `;
            });
        }
        
        html += `
                  </tbody>
                </table>
              </div>
            </div>
        `;
      }
      
      html += `</div></div>`;
      elMainContent.innerHTML = html;
      refreshIcons();
    }

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      loadMeetings(state.year);
    });

  </script>
</body>
</html>
