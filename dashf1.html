<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenF1 Explorer</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Plus Jakarta Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            neutral: {
              850: '#1f1f1f',
              950: '#0a0a0a',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    
    /* Smooth Transitions */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Glass Effect */
    .glass-panel {
      background: rgba(23, 23, 23, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="bg-neutral-950 text-white font-sans flex flex-col h-screen overflow-hidden selection:bg-red-600 selection:text-white">

  <!-- Header Aplikasi -->
  <header class="bg-black/80 backdrop-blur-md border-b border-red-700/50 px-6 py-4 flex flex-col md:flex-row justify-between items-center shrink-0 z-30 relative shadow-2xl">
    <div class="flex items-center gap-4 mb-4 md:mb-0">
      <div class="bg-gradient-to-br from-red-500 to-red-700 p-2.5 rounded-xl shadow-[0_0_15px_rgba(220,38,38,0.4)]">
        <i data-lucide="flag" class="text-white w-6 h-6"></i>
      </div>
      <div>
        <h1 class="text-2xl font-black tracking-tight uppercase italic leading-none">
          Open<span class="text-red-500">F1</span> Dash
        </h1>
        <p class="text-xs text-gray-400 mt-1 font-semibold tracking-widest uppercase">Real-Time & Historical</p>
      </div>
    </div>
    
    <div class="flex flex-col md:flex-row items-center gap-4">
      <!-- Navigation Tabs -->
      <div class="flex items-center gap-1 glass-panel p-1.5 rounded-xl">
        <button onclick="setTab('calendar')" id="tab-calendar" class="px-5 py-2 rounded-lg text-sm font-bold bg-gradient-to-r from-red-600 to-red-500 text-white shadow transition-all">Jadwal & Hasil</button>
        <button onclick="setTab('standings')" id="tab-standings" class="px-5 py-2 rounded-lg text-sm font-bold text-gray-400 hover:text-white hover:bg-white/5 transition-all">Klasemen</button>
      </div>

      <div class="flex items-center gap-2 glass-panel p-1.5 rounded-xl">
        <i data-lucide="calendar-days" class="w-5 h-5 text-gray-500 ml-2"></i>
        <div id="year-selector" class="flex gap-1">
          <!-- Year buttons generated by JS -->
        </div>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- Sidebar Kalender / Balapan -->
    <aside class="w-full md:w-80 bg-neutral-900/50 border-r border-white/5 flex flex-col h-full z-20 shrink-0 hidden md:flex backdrop-blur-xl">
      <div class="p-5 border-b border-white/5 bg-black/20">
        <h2 id="sidebar-title" class="text-sm font-black uppercase tracking-widest text-gray-400 flex items-center gap-2">
          <i data-lucide="activity" class="w-4 h-4 text-red-500"></i>
          Kalender Balap
        </h2>
      </div>
      <div id="meetings-list" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1.5">
        <!-- Meetings generated by JS -->
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col bg-neutral-950 overflow-hidden relative">
      <!-- Watermark Logo -->
      <div class="absolute -bottom-20 -right-20 opacity-[0.02] pointer-events-none text-white z-0">
         <svg width="600" height="600" viewBox="0 0 100 100" fill="currentColor">
           <path d="M22,38 l20,0 l-8,24 l-20,0 Z M46,38 l40,0 l-3,9 l-28,0 l-5,15 l-11,0 Z" />
         </svg>
      </div>

      <div id="main-content" class="relative z-10 flex flex-col h-full w-full">
        <!-- Content generated by JS -->
      </div>
    </main>
  </div>

  <!-- Modal Layout Sirkuit Fullscreen -->
  <div id="circuit-modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col items-center justify-center p-6 md:p-12 backdrop-blur-md opacity-0 transition-opacity duration-300">
    <button onclick="closeCircuitModal()" class="absolute top-6 right-6 text-white bg-white/10 hover:bg-red-600 p-3 rounded-full transition-all duration-300 z-10 shadow-lg">
      <i data-lucide="x" class="w-6 h-6"></i>
    </button>
    <h3 id="modal-circuit-name" class="text-white text-3xl md:text-5xl font-black italic uppercase tracking-widest mb-10 drop-shadow-2xl"></h3>
    <img id="modal-circuit-img" src="" class="max-w-full max-h-[75vh] object-contain rounded-2xl drop-shadow-[0_0_40px_rgba(255,255,255,0.15)]" />
  </div>

  <!-- Modal Breakdown Poin -->
  <div id="breakdown-modal" class="fixed inset-0 z-[110] bg-black/80 hidden flex-col items-center justify-center p-4 md:p-8 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="glass-panel w-full max-w-4xl max-h-[90vh] flex flex-col rounded-3xl overflow-hidden border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative bg-neutral-900/90">
      <button onclick="closeBreakdownModal()" class="absolute top-5 right-5 text-gray-400 hover:text-white bg-white/5 hover:bg-red-600 p-2.5 rounded-full transition-all duration-300 z-20">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
      
      <div id="breakdown-header" class="p-6 md:p-8 border-b border-white/5 bg-gradient-to-r from-neutral-900 to-neutral-950 shrink-0 relative z-10">
        <!-- Generated via JS -->
      </div>
      
      <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8">
        <div id="breakdown-content">
          <!-- Generated via JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Aplikasi Logic -->
  <script>
    // --- CACHING SYSTEM (5 MINUTES) ---
    const apiCache = new Map();
    const CACHE_TTL = 5 * 60 * 1000; // 5 Menit dalam milidetik

    async function fetchCached(url) {
      const now = Date.now();
      
      // Cek apakah ada di cache dan belum expired
      if (apiCache.has(url)) {
        const cached = apiCache.get(url);
        if (now - cached.timestamp < CACHE_TTL) {
          return cached.data; // Kembalikan dari cache
        }
      }
      
      // Jika tidak ada atau expired, fetch dari server
      try {
        const res = await fetch(url);
        if (!res.ok) {
           if (res.status === 429) throw new Error("Terlalu banyak permintaan (Rate Limited). Harap tunggu beberapa saat.");
           throw new Error(`HTTP Error: ${res.status}`);
        }
        const data = await res.json();
        
        // Simpan ke dalam cache
        apiCache.set(url, { timestamp: now, data });
        return data;
      } catch (err) {
        throw err;
      }
    }

    // --- STATE MANAGEMENT ---
    const state = {
      tab: 'calendar', // 'calendar' or 'standings'
      standingsMode: 'drivers', // 'drivers' or 'constructors'
      year: new Date().getFullYear(),
      meetings: [],
      selectedMeeting: null,
      sessions: [],
      selectedSession: null,
      drivers: [],
      positions: {},
      intervals: {},
      standings: {}, 
      viewMode: 'grid', // 'grid', 'result', or 'replay'
      replay: {
         dataByDriver: {}, trackPoints: [], trackBgCanvas: null,
         scale: 1, offsetX: 0, offsetY: 0,
         minX: 0, maxX: 0, minY: 0, maxY: 0, 
         startTime: 0, endTime: 0, currentTime: 0,
         isPlaying: false, loading: false, error: null, animationId: null
      },
      loading: { meetings: false, sessions: false, drivers: false, positions: false, standings: false },
      error: null
    };

    // --- DOM ELEMENTS ---
    const elYearSelector = document.getElementById('year-selector');
    const elMeetingsList = document.getElementById('meetings-list');
    const elMainContent = document.getElementById('main-content');
    const elSidebarTitle = document.getElementById('sidebar-title');

    // --- UTILS ---
    const getTeamColor = (hex) => hex ? `#${hex}` : '#525252';
    
    const getCircuitLayoutUrl = (countryName) => {
      const formattedName = countryName.replace(/\s+/g, '_');
      return `https://media.formula1.com/image/upload/f_auto/q_auto/v1677244985/content/dam/fom-website/2018-redesign-assets/Circuit%20maps%2016x9/${formattedName}_Circuit.png.transform/8col/image.png`;
    };

    const getPoints = (position, sessionName) => {
      if (!position || position < 1) return 0;
      const isSprint = sessionName && sessionName.toLowerCase().includes('sprint');
      if (isSprint) {
        return position <= 8 ? [8, 7, 6, 5, 4, 3, 2, 1][position - 1] : 0;
      } else {
        return position <= 10 ? [25, 18, 15, 12, 10, 8, 6, 4, 2, 1][position - 1] : 0;
      }
    };

    // --- MODALS ---
    const openCircuitModal = (imgUrl, name) => {
      const modal = document.getElementById('circuit-modal');
      document.getElementById('modal-circuit-img').src = imgUrl;
      document.getElementById('modal-circuit-name').innerText = `Sirkuit ${name}`;
      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.remove('opacity-0'), 10);
    };

    const closeCircuitModal = () => {
      const modal = document.getElementById('circuit-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 300);
    };

    const openBreakdownModal = (type, id) => {
      const modal = document.getElementById('breakdown-modal');
      const headerEl = document.getElementById('breakdown-header');
      const contentEl = document.getElementById('breakdown-content');

      let data, title, subtitle, teamColor;

      if (type === 'driver') {
        data = state.standings[state.year].drivers.find(d => d.driver_number == id);
        title = `${data.details.first_name} <span class="uppercase font-black">${data.details.last_name}</span>`;
        subtitle = `No. ${data.details.driver_number} &bull; ${data.details.team_name}`;
        teamColor = getTeamColor(data.details.team_colour);
      } else {
        data = state.standings[state.year].constructors.find(c => c.team_name === id);
        title = `<span class="uppercase font-black">${data.team_name}</span>`;
        subtitle = `Pembalap: ${data.drivers.join(', ')}`;
        teamColor = getTeamColor(data.team_colour);
      }

      headerEl.innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center gap-4 md:gap-6">
          <div class="w-3 h-16 rounded-full shrink-0 hidden sm:block" style="background-color: ${teamColor}"></div>
          <div class="flex-1">
            <h3 class="text-3xl md:text-4xl font-black italic text-white drop-shadow-md leading-tight">${title}</h3>
            <p class="text-gray-400 font-bold mt-1.5 text-sm tracking-widest uppercase">${subtitle}</p>
          </div>
          <div class="sm:text-right bg-black/40 p-3 rounded-xl border border-white/5">
            <div class="text-4xl font-black italic text-white leading-none">${data.points}</div>
            <div class="text-xs text-red-500 font-black tracking-widest mt-1">TOTAL POINTS</div>
          </div>
        </div>
      `;

      if (!data.history || data.history.length === 0) {
        contentEl.innerHTML = `<div class="text-center text-gray-500 py-10 font-medium text-lg">Belum ada poin yang dicetak musim ini.</div>`;
      } else {
        const sortedHistory = [...data.history].sort((a, b) => new Date(b.date) - new Date(a.date));

        contentEl.innerHTML = `
          <table class="w-full text-left border-collapse min-w-[600px]">
            <thead>
              <tr class="bg-black/40 text-[10px] uppercase tracking-widest text-gray-500 border-b border-white/5">
                <th class="p-4 font-bold">Grand Prix</th>
                <th class="p-4 font-bold">Sesi</th>
                ${type === 'constructor' ? '<th class="p-4 font-bold">Pembalap</th>' : ''}
                <th class="p-4 text-center font-bold">Posisi Finish</th>
                <th class="p-4 text-right font-bold text-red-400">Poin Didapat</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-white/5">
              ${sortedHistory.map(h => `
                <tr class="hover:bg-white/5 transition-colors">
                  <td class="p-4 font-black text-gray-200 text-lg uppercase italic tracking-tight">${h.meeting_name}</td>
                  <td class="p-4 text-sm font-bold text-gray-400">
                    <span class="${h.session_name.includes('Sprint') ? 'text-blue-400 bg-blue-400/10' : 'text-green-400 bg-green-400/10'} px-2 py-1 rounded">
                      ${h.session_name}
                    </span>
                  </td>
                  ${type === 'constructor' ? `<td class="p-4 text-sm font-black text-gray-300 uppercase">${h.driver_name}</td>` : ''}
                  <td class="p-4 text-center font-black text-white text-xl">P${h.position}</td>
                  <td class="p-4 text-right">
                    <span class="inline-block bg-red-500/10 border border-red-500/20 text-red-500 font-black px-3 py-1.5 rounded-lg text-lg">
                      +${h.points}
                    </span>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.remove('opacity-0'), 10);
      refreshIcons();
    };

    const closeBreakdownModal = () => {
      const modal = document.getElementById('breakdown-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 300);
    };

    const refreshIcons = () => {
      setTimeout(() => lucide.createIcons(), 0);
    };

    // --- REPLAY SYSTEM LOGIC ---
    async function loadReplayData() {
      if (!state.selectedSession) return;
      
      state.replay.loading = true;
      state.replay.error = null;
      renderMain(); 

      try {
        // Mengambil semua data full sesi (tidak di limit 15 menit lagi)
        const url = `https://api.openf1.org/v1/location?session_key=${state.selectedSession.session_key}`;
        const data = await fetchCached(url);

        if (!data || data.length === 0) {
           state.replay.error = "Data telemetri lokasi (X/Y) tidak tersedia di API untuk sesi ini.";
        } else {
           let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
           const dataByDriver = {};
           const trackPoints = [];
           
           // Loop 1: Ekstraksi batas Min/Max dan kelompokkan data per driver
           data.forEach((d, i) => {
              if (d.x < minX) minX = d.x;
              if (d.x > maxX) maxX = d.x;
              if (d.y < minY) minY = d.y;
              if (d.y > maxY) maxY = d.y;
              
              if (!dataByDriver[d.driver_number]) dataByDriver[d.driver_number] = [];
              dataByDriver[d.driver_number].push({ time: new Date(d.date).getTime(), x: d.x, y: d.y });

              // Downsample points untuk menggambar outline lintasan secara otomatis
              if (i % 15 === 0) trackPoints.push({ x: d.x, y: d.y }); 
           });

           // Loop 2: Pastikan data masing-masing driver terurut berdasar waktu (PENTING untuk Binary Search)
           let overallMinTime = Infinity;
           let overallMaxTime = -Infinity;
           
           Object.values(dataByDriver).forEach(arr => {
               arr.sort((a, b) => a.time - b.time);
               if (arr.length > 0) {
                   if (arr[0].time < overallMinTime) overallMinTime = arr[0].time;
                   if (arr[arr.length - 1].time > overallMaxTime) overallMaxTime = arr[arr.length - 1].time;
               }
           });

           state.replay.dataByDriver = dataByDriver;
           state.replay.trackPoints = trackPoints;
           state.replay.minX = minX;
           state.replay.maxX = maxX;
           state.replay.minY = minY;
           state.replay.maxY = maxY;
           state.replay.startTime = overallMinTime;
           state.replay.endTime = overallMaxTime;
           state.replay.currentTime = overallMinTime;
        }
      } catch (err) {
         state.replay.error = err.message;
      } finally {
         state.replay.loading = false;
         if (state.viewMode === 'replay') {
            renderMain();
            if (!state.replay.error) setTimeout(initReplayCanvas, 100);
         }
      }
    }

    function initReplayCanvas() {
      const canvas = document.getElementById('replay-canvas');
      if (!canvas) return;

      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight || 500;
      
      const ctx = canvas.getContext('2d');
      const rState = state.replay;

      const padding = 40;
      const width = canvas.width - padding * 2;
      const height = canvas.height - padding * 2;
      
      const trackWidth = rState.maxX - rState.minX;
      const trackHeight = rState.maxY - rState.minY;
      
      // Skala seragam
      const scale = Math.min(width / trackWidth, height / trackHeight);
      const offsetX = padding + (width - trackWidth * scale) / 2;
      const offsetY = padding + (height - trackHeight * scale) / 2;

      // --- MEMBUAT BACKGROUND TRACK (GHOST MAPPING) ---
      // Daripada kosong, kita cat pergerakan mobil jadi lintasan dengan offscreen canvas
      const trackBg = document.createElement('canvas');
      trackBg.width = canvas.width;
      trackBg.height = canvas.height;
      const bgCtx = trackBg.getContext('2d');
      
      bgCtx.fillStyle = '#404040';
      bgCtx.globalAlpha = 0.2; // Opacity kecil agar overlap memunculkan racing line yang nyata
      
      for(let i = 0; i < rState.trackPoints.length; i++) {
         const pos = rState.trackPoints[i];
         const cx = offsetX + (pos.x - rState.minX) * scale;
         const cy = offsetY + (rState.maxY - pos.y) * scale;
         bgCtx.beginPath();
         bgCtx.arc(cx, cy, 3, 0, Math.PI * 2);
         bgCtx.fill();
      }

      rState.trackBgCanvas = trackBg;
      rState.scale = scale;
      rState.offsetX = offsetX;
      rState.offsetY = offsetY;

      let lastDrawTime = performance.now();

      function drawLoop(time) {
         if (!rState.isPlaying) {
             state.replay.animationId = requestAnimationFrame(drawLoop);
             return;
         }

         const dt = time - lastDrawTime;
         lastDrawTime = time;

         // Full sesi itu panjang (2 jam). Kita lipat gandakan speednya 120x lipat
         // Jadi balapan 2 jam bisa ditonton dalam 1 menit doang.
         rState.currentTime += dt * 120;

         if (rState.currentTime > rState.endTime) {
             rState.isPlaying = false; 
             rState.currentTime = rState.endTime;
             const btn = document.getElementById('btn-play-pause');
             if(btn) {
                 btn.innerHTML = '<i data-lucide="play" class="w-5 h-5"></i>';
                 lucide.createIcons();
             }
         }

         drawCanvas(ctx, canvas);
         updateReplayUI();
         state.replay.animationId = requestAnimationFrame(drawLoop);
      }

      // Draw first frame
      drawCanvas(ctx, canvas);
      state.replay.animationId = requestAnimationFrame(drawLoop);
    }

    function drawCanvas(ctx, canvas) {
      const rState = state.replay;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. Gambar Lintasan Otomatis
      if (rState.trackBgCanvas) {
          ctx.drawImage(rState.trackBgCanvas, 0, 0);
      }

      // 2. Binary Search untuk mencari posisi paling presisi tanpa bikin nge-lag
      const latestPos = {};
      Object.keys(rState.dataByDriver).forEach(driverNum => {
         const driverData = rState.dataByDriver[driverNum];
         let left = 0; 
         let right = driverData.length - 1; 
         let bestMatch = null;
         
         while (left <= right) {
            let mid = Math.floor((left + right) / 2);
            if (driverData[mid].time <= rState.currentTime) {
               bestMatch = driverData[mid]; // Ini titik terdekat di bawah atau sama dgn current time
               left = mid + 1;
            } else {
               right = mid - 1;
            }
         }
         
         if (bestMatch) latestPos[driverNum] = bestMatch;
      });

      // 3. Render Dot Pembalap
      Object.entries(latestPos).forEach(([driverNum, pos]) => {
         if (pos.x == null || pos.y == null) return;

         const driver = state.drivers.find(d => d.driver_number == driverNum);
         const teamColor = driver ? getTeamColor(driver.team_colour) : '#ffffff';

         const cx = rState.offsetX + (pos.x - rState.minX) * rState.scale;
         const cy = rState.offsetY + (rState.maxY - pos.y) * rState.scale;

         // Dot Pembalap
         ctx.beginPath();
         ctx.arc(cx, cy, 7, 0, 2 * Math.PI);
         ctx.fillStyle = teamColor;
         ctx.fill();
         ctx.strokeStyle = '#ffffff';
         ctx.lineWidth = 1.5;
         ctx.stroke();

         // Nomor Mobil
         ctx.fillStyle = '#ffffff';
         ctx.font = 'bold 11px "Plus Jakarta Sans", sans-serif';
         ctx.shadowColor = 'rgba(0,0,0,0.8)';
         ctx.shadowBlur = 4;
         ctx.fillText(driverNum, cx + 10, cy + 4);
         ctx.shadowBlur = 0; 
      });
    }

    function toggleReplay() {
      state.replay.isPlaying = !state.replay.isPlaying;
      const btn = document.getElementById('btn-play-pause');
      if (btn) {
          btn.innerHTML = `<i data-lucide="${state.replay.isPlaying ? 'pause' : 'play'}" class="w-5 h-5"></i>`;
          lucide.createIcons();
      }
    }

    function seekReplay(percent) {
      if (!state.replay.startTime) return;
      const rState = state.replay;
      const totalDuration = rState.endTime - rState.startTime;
      rState.currentTime = rState.startTime + (totalDuration * (percent / 100));
      
      const canvas = document.getElementById('replay-canvas');
      if (canvas) {
          drawCanvas(canvas.getContext('2d'), canvas);
          updateReplayUI();
      }
    }

    function updateReplayUI() {
      const rState = state.replay;
      const elapsed = rState.currentTime - rState.startTime;
      
      // Hitung dalam durasi simulasi (bukan durasi asli) untuk UI jam balapan
      const hours = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
      const mins = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
      const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
      
      const timeEl = document.getElementById('replay-time');
      if(timeEl) timeEl.innerText = `${hours}:${mins}:${secs}`;
      
      const slider = document.getElementById('replay-slider');
      if(slider && rState.endTime > rState.startTime) {
          slider.value = ((rState.currentTime - rState.startTime) / (rState.endTime - rState.startTime)) * 100;
      }
    }

    // --- FETCH DATA (MENGGUNAKAN CACHE) ---
    async function loadMeetings(year) {
      state.year = year;
      state.loading.meetings = true;
      state.error = null;
      renderYearSelector();
      renderSidebar();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/meetings?year=${year}`);
        data.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
        state.meetings = data;
        
        if (data.length > 0) {
          const now = new Date();
          const upcoming = data.find(m => new Date(m.date_start) > now) || data[data.length - 1];
          selectMeeting(upcoming);
        } else {
          selectMeeting(null);
        }
      } catch (err) {
        state.error = err.message;
        renderSidebar();
      } finally {
        state.loading.meetings = false;
        renderSidebar();
      }
    }

    async function loadSessions() {
      if (!state.selectedMeeting) {
        state.sessions = [];
        selectSession(null);
        return;
      }
      
      state.loading.sessions = true;
      renderMain();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/sessions?meeting_key=${state.selectedMeeting.meeting_key}`);
        data.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
        state.sessions = data;
        
        if (data.length > 0) {
          selectSession(data[data.length - 1]);
        } else {
          selectSession(null);
        }
      } catch (err) {
        console.error(err);
      } finally {
        state.loading.sessions = false;
        renderMain();
      }
    }

    async function loadDrivers() {
      if (!state.selectedSession) {
        state.drivers = [];
        renderMain();
        return;
      }
      
      state.loading.drivers = true;
      renderMain();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/drivers?session_key=${state.selectedSession.session_key}`);
        
        const uniqueDrivers = [];
        const seen = new Set();
        data.forEach(d => {
          if (!seen.has(d.driver_number)) {
            seen.add(d.driver_number);
            uniqueDrivers.push(d);
          }
        });
        
        uniqueDrivers.sort((a, b) => {
          const teamA = a.team_name || '';
          const teamB = b.team_name || '';
          if (teamA < teamB) return -1;
          if (teamA > teamB) return 1;
          return a.driver_number - b.driver_number;
        });
        
        state.drivers = uniqueDrivers;
      } catch (err) {
        console.error(err);
      } finally {
        state.loading.drivers = false;
        renderMain();
      }
    }

    async function loadPositions() {
      if (!state.selectedSession) {
        state.positions = {};
        return;
      }
      
      state.loading.positions = true;
      renderMain();
      
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/position?session_key=${state.selectedSession.session_key}`);
        const latestPos = {};
        data.forEach(p => {
          latestPos[p.driver_number] = p.position;
        });
        state.positions = latestPos;
      } catch (err) {
        console.error(err);
      } finally {
        state.loading.positions = false;
        renderMain();
      }
    }

    async function loadIntervals() {
      if (!state.selectedSession) {
        state.intervals = {};
        return;
      }
      try {
        const data = await fetchCached(`https://api.openf1.org/v1/intervals?session_key=${state.selectedSession.session_key}`);
        const latestIntervals = {};
        data.forEach(i => {
          if (i.gap_to_leader !== null) latestIntervals[i.driver_number] = `+${i.gap_to_leader}s`;
          else if (i.interval !== null) latestIntervals[i.driver_number] = `+${i.interval}s`;
        });
        state.intervals = latestIntervals;
        renderMain(); 
      } catch (err) {
        console.error(err);
      }
    }

    async function loadStandingsData() {
      if (state.standings[state.year]) {
         renderStandings();
         return;
      }
      
      state.loading.standings = true;
      renderStandings();
      
      try {
        if (state.meetings.length === 0 || state.meetings[0].year !== state.year) {
            state.meetings = await fetchCached(`https://api.openf1.org/v1/meetings?year=${state.year}`);
        }

        const sessions = await fetchCached(`https://api.openf1.org/v1/sessions?year=${state.year}`);
        const now = new Date();
        const validSessions = sessions.filter(s => 
          (s.session_name === 'Race' || s.session_name.includes('Sprint')) && 
          new Date(s.date_start) < now
        );
        
        let driversMap = {};
        
        for (const s of validSessions) {
          try {
            const positions = await fetchCached(`https://api.openf1.org/v1/position?session_key=${s.session_key}`);
            
            const meeting = state.meetings.find(m => m.meeting_key === s.meeting_key) || { meeting_name: 'Unknown GP', country_name: 'Unknown' };
            const mName = meeting.meeting_name || meeting.country_name;

            const latestPos = {};
            positions.forEach(p => { latestPos[p.driver_number] = p.position; });
            
            Object.entries(latestPos).forEach(([dNum, pos]) => {
              const pts = getPoints(pos, s.session_name);
              if (pts > 0) {
                 if (!driversMap[dNum]) driversMap[dNum] = { driver_number: dNum, points: 0, history: [] };
                 driversMap[dNum].points += pts;
                 driversMap[dNum].history.push({
                     meeting_name: mName,
                     session_name: s.session_name,
                     position: pos,
                     points: pts,
                     date: s.date_start
                 });
              }
            });
            await new Promise(r => setTimeout(r, 100)); // Delay antar request tetap perlu biarpun ada cache
          } catch (e) {}
        }
        
        let driverDetailsMap = {};
        if (validSessions.length > 0) {
          const latestSession = validSessions[validSessions.length - 1];
          try {
              const driverData = await fetchCached(`https://api.openf1.org/v1/drivers?meeting_key=${latestSession.meeting_key}`);
              driverData.forEach(d => { driverDetailsMap[d.driver_number] = d; });
          } catch(e) {}
          
          const firstSession = validSessions[0];
          try {
              const driverData = await fetchCached(`https://api.openf1.org/v1/drivers?meeting_key=${firstSession.meeting_key}`);
              driverData.forEach(d => { 
                  if (!driverDetailsMap[d.driver_number]) driverDetailsMap[d.driver_number] = d; 
              });
          } catch(e) {}
        }
        
        let constructorsMap = {};

        const finalDrivers = Object.values(driversMap).map(d => {
            d.details = driverDetailsMap[d.driver_number] || { 
                driver_number: d.driver_number, first_name: 'Unknown', last_name: 'Driver', name_acronym: 'UNK', team_name: 'Unknown', team_colour: '525252' 
            };
            
            const tName = d.details.team_name || 'Tim Tidak Diketahui';
            
            if (!constructorsMap[tName]) {
                constructorsMap[tName] = { team_name: tName, team_colour: d.details.team_colour, points: 0, history: [], drivers: [] };
            }
            constructorsMap[tName].points += d.points;
            
            d.history.forEach(h => {
                constructorsMap[tName].history.push({...h, driver_name: d.details.last_name});
            });
            
            if (!constructorsMap[tName].drivers.includes(d.details.last_name)) {
                constructorsMap[tName].drivers.push(d.details.last_name);
            }
            
            return d;
        }).sort((a, b) => b.points - a.points);

        const finalConstructors = Object.values(constructorsMap).sort((a, b) => b.points - a.points);

        state.standings[state.year] = {
            drivers: finalDrivers,
            constructors: finalConstructors
        };
          
      } catch (err) {
        console.error("Gagal hitung klasemen:", err);
      } finally {
        state.loading.standings = false;
        renderStandings();
      }
    }

      state.selectedSession = session;

      if (state.replay.animationId) cancelAnimationFrame(state.replay.animationId);
      state.replay = { 
        dataByDriver: {}, trackPoints: [], trackBgCanvas: null,
        scale: 1, offsetX: 0, offsetY: 0, minX: 0, maxX: 0, minY: 0, maxY: 0, 
        startTime: 0, endTime: 0, currentTime: 0, isPlaying: false, loading: false, error: null, animationId: null 
      };
      
      loadDrivers();
      loadPositions();
      loadIntervals();
      if(state.viewMode === 'replay') loadReplayData();
    }

    function setViewMode(mode) {
      if(state.viewMode === 'replay' && state.replay.animationId) {
          cancelAnimationFrame(state.replay.animationId);
      }
      
      state.viewMode = mode;
      
      if(mode === 'replay' && Object.keys(state.replay.dataByDriver).length === 0) {
          loadReplayData();
      } else {
          renderMain();
          if(mode === 'replay') setTimeout(initReplayCanvas, 50);
      }
    }

    function setTab(tab) {
      if (state.tab === tab) return;
      state.tab = tab;
      
      if(state.viewMode === 'replay' && state.replay.animationId) {
          cancelAnimationFrame(state.replay.animationId);
      }

              </div>
            </div>
          `;
        } 
        else if (state.loading.drivers) {
          // LOADING STATE
          html += `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">`;
          html += Array(20).fill(0).map(() => `<div class="aspect-[3/4] bg-white/5 rounded-2xl animate-pulse"></div>`).join('');
          html += `</div>`;
        } 
        else if (state.drivers.length === 0) {
          // EMPTY STATE
          html += `
            <div class="text-center py-16 glass-panel rounded-2xl border-dashed border-white/10">
              <p class="text-gray-500 font-medium text-lg">Data pembalap belum tersedia untuk sesi ini.</p>
            </div>
          `;
        } 
        else if (state.viewMode === 'grid') {
          // --- GRID VIEW ---
          html += `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5 pb-8">`;
          html += state.drivers.map(d => {
            const teamColor = getTeamColor(d.team_colour);
            return `
              <div class="glass-panel rounded-2xl overflow-hidden relative group hover:-translate-y-2 transition-all duration-300 hover:shadow-2xl"
                   style="border-bottom: 4px solid ${teamColor}; box-shadow: 0 10px 30px -10px ${teamColor}30;">
                
                <div class="absolute top-2 -right-3 font-black text-7xl italic opacity-[0.04] group-hover:opacity-[0.08] transition-opacity duration-300 select-none z-0">
                  ${d.driver_number}
                </div>
                
                <div class="p-5 flex flex-col h-full relative z-10">
                  <div class="flex justify-between items-start w-full mb-3">
                    <span class="text-xl font-black italic bg-white text-black px-2.5 rounded shadow-sm leading-none py-1.5">
                      ${d.driver_number}
                    </span>
                    <span class="text-[11px] font-bold uppercase tracking-widest text-gray-400 bg-black/50 px-2 py-1 rounded">
                      ${d.name_acronym}
                    </span>
                  </div>
                  
                  <div class="flex-1 flex flex-col justify-end items-center mt-2 mb-4">
                    <img 
                      src="${d.headshot_url || 'https://media.formula1.com/d_driver_fallback_image.png'}" 
                      alt="${d.full_name}" 
                      class="w-28 h-28 object-contain drop-shadow-2xl transform group-hover:scale-110 transition-transform duration-500 ease-out"
                      onerror="this.onerror=null; this.src='https://media.formula1.com/d_driver_fallback_image.png';"
                    />
                  </div>
                  
                  <div class="mt-auto text-center pt-3 border-t border-white/5">
                    <h4 class="font-bold text-base leading-tight">
                      <span class="font-medium text-gray-400 block text-xs mb-0.5">${d.first_name}</span> 
                      <span class="uppercase font-black tracking-wider">${d.last_name}</span>
                    </h4>
                    <p class="text-[10px] mt-2 font-black uppercase tracking-widest px-2.5 py-1.5 rounded-lg bg-black/40 truncate shadow-inner" 
                       style="color: ${teamColor}; border: 1px solid ${teamColor}20;">
                      ${d.team_name || 'Tim Tidak Diketahui'}
                    </p>
                  </div>
                </div>
              </div>
            `;
          }).join('');
          html += `</div>`;
        } 
        else {
          // --- RESULT TABLE VIEW ---
          const sorted = [...state.drivers].sort((a, b) => {
             const posA = state.positions[a.driver_number] || 999;
             const posB = state.positions[b.driver_number] || 999;
             return posA - posB;
          });

          html += `
            <div class="glass-panel rounded-2xl overflow-hidden border border-white/5 shadow-2xl pb-8 mb-8">
              <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[600px]">
                  <thead>
                    <tr class="bg-black/40 text-xs uppercase tracking-widest text-gray-400 border-b border-white/10">
                      <th class="p-5 w-20 text-center font-bold">Pos</th>
                      <th class="p-5 font-bold">Pembalap</th>
                      <th class="p-5 font-bold">Tim</th>
                      <th class="p-5 text-center font-bold">Waktu/Gap</th>
                      <th class="p-5 text-center font-bold text-red-400">Poin</th>
                      <th class="p-5 w-24 text-center font-bold">No</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-white/5">
          `;

          if (state.loading.positions) {
             html += `<tr><td colspan="6" class="p-12 text-center text-gray-500 font-medium"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-3 text-red-500"></i> Menghitung klasemen sesi...</td></tr>`;
          } else {
             html += sorted.map(d => {
                const pos = state.positions[d.driver_number] || '-';
                const teamColor = getTeamColor(d.team_colour);
                
                const gap = state.intervals[d.driver_number] || (pos === 1 ? 'Leader' : '-');
                const points = getPoints(pos, state.selectedSession.session_name);
                
                let posStyle = 'text-white';
                if (pos === 1) posStyle = 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]';
                else if (pos === 2) posStyle = 'text-gray-300 drop-shadow-[0_0_8px_rgba(209,213,219,0.5)]';
                else if (pos === 3) posStyle = 'text-amber-600 drop-shadow-[0_0_8px_rgba(217,119,6,0.5)]';
                
                return `
                  <tr class="hover:bg-white/5 transition-colors group">
                    <td class="p-5 text-center font-black text-2xl ${posStyle}">${pos}</td>
                    <td class="p-5">
                      <div class="flex items-center gap-4">
                        <img src="${d.headshot_url || 'https://media.formula1.com/d_driver_fallback_image.png'}" class="w-12 h-12 object-cover rounded-full bg-black/20 border border-white/10" onerror="this.onerror=null; this.src='https://media.formula1.com/d_driver_fallback_image.png';" />
                        <div>
                          <div class="font-bold text-lg text-white group-hover:text-red-400 transition-colors">${d.first_name} <span class="uppercase font-black">${d.last_name}</span></div>
                          <div class="text-[11px] font-bold uppercase tracking-widest text-gray-500">${d.name_acronym}</div>
                        </div>
                      </div>
                    </td>
                    <td class="p-5">
                      <div class="flex items-center gap-3 glass-panel px-3 py-1.5 rounded-lg inline-flex">
                        <div class="w-3.5 h-3.5 rounded-full shadow-sm" style="background-color: ${teamColor}"></div>
                        <span class="text-sm font-bold text-gray-300">${d.team_name || 'Tim Tidak Diketahui'}</span>
                      </div>
                    </td>
                    <td class="p-5 text-center font-mono text-sm text-gray-300">${gap}</td>
                    <td class="p-5 text-center font-black text-lg text-red-500 bg-red-900/10 rounded">${points > 0 ? '+'+points : '-'}</td>
                    <td class="p-5 text-center">
                      <span class="text-lg font-black italic bg-white text-black px-3 py-1.5 rounded shadow-sm">${d.driver_number}</span>
                    </td>
                  </tr>
                `;
             }).join('');
          }
          
          html += `
                  </tbody>
                </table>
              </div>
            </div>
          `;
        }
        
        html += `</div>`;
      }

      html += `</div></div>`;
      
      elMainContent.innerHTML = html;
      refreshIcons();
    }

    function renderStandings() {
      let html = `
        <div class="flex-1 flex flex-col h-full overflow-hidden bg-neutral-950 fade-in">
          <div class="p-8 md:p-14 border-b border-white/5 shrink-0 bg-gradient-to-b from-neutral-900 to-neutral-950">
             <div class="flex items-center gap-5 mb-6">
                <div class="p-4 bg-gradient-to-br from-red-600/30 to-red-900/30 rounded-2xl border border-red-500/30 shadow-[0_0_20px_rgba(220,38,38,0.2)]">
                  <i data-lucide="trophy" class="w-10 h-10 text-red-500"></i>
                </div>
                <div>
                  <h2 class="text-4xl md:text-5xl font-black uppercase italic tracking-tight text-white drop-shadow-2xl">Klasemen</h2>
                  <p class="text-gray-400 font-medium mt-2 text-lg">Akumulasi Poin Championship Musim <span class="text-white font-bold">${state.year}</span></p>
                </div>
             </div>
             
             <!-- Toggle Driver vs Constructor -->
             <div class="flex glass-panel rounded-xl p-1 shadow-inner inline-flex border border-white/10">
                <button onclick="setStandingsMode('drivers')" class="px-6 py-2.5 rounded-lg text-sm font-bold transition-all duration-300 ${state.standingsMode === 'drivers' ? 'bg-gradient-to-r from-red-600 to-red-500 text-white shadow' : 'text-gray-500 hover:text-white hover:bg-white/5'}">
                  Pembalap
                </button>
                <button onclick="setStandingsMode('constructors')" class="px-6 py-2.5 rounded-lg text-sm font-bold transition-all duration-300 ${state.standingsMode === 'constructors' ? 'bg-gradient-to-r from-red-600 to-red-500 text-white shadow' : 'text-gray-500 hover:text-white hover:bg-white/5'}">
                  Konstruktor
                </button>
             </div>
          </div>
          
          <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-14 pt-8">
      `;
      
      if (state.loading.standings) {
        html += `
            <div class="flex flex-col items-center justify-center h-[50vh] gap-6 text-gray-400">
              <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-red-500"></i>
              <p class="font-medium text-lg animate-pulse">Menghitung akumulasi poin dari semua balapan ${state.year}...</p>
              <p class="text-sm opacity-50 max-w-md text-center">Proses ini mengambil data setiap sesi yang sudah berlalu, harap tunggu sebentar.</p>
            </div>
        `;
      } else if (!state.standings[state.year] || state.standings[state.year].drivers.length === 0) {
        html += `
            <div class="text-center py-16 glass-panel rounded-2xl border-dashed border-white/10 max-w-4xl mx-auto">
              <p class="text-gray-500 font-medium text-lg">Belum ada data klasemen / balapan untuk tahun ${state.year}.</p>
            </div>
        `;
      } else {
        html += `
            <div class="glass-panel rounded-3xl overflow-hidden border border-white/5 shadow-2xl max-w-5xl mx-auto mb-10">
              <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[600px]">
                  <thead>
                    <tr class="bg-black/80 text-xs uppercase tracking-widest text-gray-400 border-b border-white/10">
                      <th class="p-6 w-24 text-center font-bold">Pos</th>
                      <th class="p-6 font-bold">${state.standingsMode === 'drivers' ? 'Pembalap' : 'Tim / Konstruktor'}</th>
                      <th class="p-6 font-bold">${state.standingsMode === 'drivers' ? 'Tim' : 'Daftar Pembalap'}</th>
                      <th class="p-6 text-center font-bold text-red-400">Total Poin</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-white/5">
        `;
        
        if (state.standingsMode === 'drivers') {
            state.standings[state.year].drivers.forEach((st, index) => {
              const d = st.details;
              const pos = index + 1;
              const teamColor = getTeamColor(d.team_colour);
              
              let posStyle = 'text-white font-black';
              if (pos === 1) posStyle = 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.6)] text-4xl font-black';
              else if (pos === 2) posStyle = 'text-gray-300 drop-shadow-[0_0_10px_rgba(209,213,219,0.5)] text-3xl font-black';
              else if (pos === 3) posStyle = 'text-amber-600 drop-shadow-[0_0_10px_rgba(217,119,6,0.5)] text-3xl font-black';
              else posStyle += ' text-2xl';
              
              html += `
                <tr onclick="openBreakdownModal('driver', '${d.driver_number}')" class="hover:bg-white/5 transition-colors group cursor-pointer relative">
                  <td class="p-6 text-center ${posStyle}">${pos}</td>
                  <td class="p-6">
                    <div class="flex items-center gap-5">
                      <img src="${d.headshot_url || 'https://media.formula1.com/d_driver_fallback_image.png'}" class="w-16 h-16 object-cover rounded-full bg-black/40 border-[3px]" style="border-color: ${teamColor}80;" onerror="this.onerror=null; this.src='https://media.formula1.com/d_driver_fallback_image.png';" />
                      <div>
                        <div class="font-bold text-2xl text-white group-hover:text-red-400 transition-colors">${d.first_name} <span class="uppercase font-black">${d.last_name}</span></div>
                        <div class="text-xs font-bold uppercase tracking-widest text-gray-500 mt-1">${d.name_acronym} <span class="opacity-50 mx-1">•</span> No. ${d.driver_number}</div>
                      </div>
                    </div>
                  </td>
                  <td class="p-6">
                    <div class="flex items-center gap-3 glass-panel px-4 py-2 rounded-xl inline-flex shadow-inner">
                      <div class="w-4 h-4 rounded-full shadow-sm" style="background-color: ${teamColor}"></div>
                      <span class="text-sm font-bold text-gray-300">${d.team_name || 'Tim Tidak Diketahui'}</span>
                    </div>
                  </td>
                  <td class="p-6 text-center relative">
                    <div class="bg-red-500/10 border border-red-500/20 py-2 rounded-xl inline-block min-w-[100px] group-hover:bg-red-500/20 transition-colors">
                      <span class="text-4xl font-black italic text-white drop-shadow-md">${st.points}</span>
                      <span class="text-xs text-red-500 font-bold ml-1">PTS</span>
                    </div>
                  </td>
                </tr>
              `;
            });
        } else {
            // Render Konstruktor
            state.standings[state.year].constructors.forEach((c, index) => {
              const pos = index + 1;
              const teamColor = getTeamColor(c.team_colour);
              
              let posStyle = 'text-white font-black';
              if (pos === 1) posStyle = 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.6)] text-4xl font-black';
              else if (pos === 2) posStyle = 'text-gray-300 drop-shadow-[0_0_10px_rgba(209,213,219,0.5)] text-3xl font-black';
              else if (pos === 3) posStyle = 'text-amber-600 drop-shadow-[0_0_10px_rgba(217,119,6,0.5)] text-3xl font-black';
              else posStyle += ' text-2xl';
              
              html += `
                <tr onclick="openBreakdownModal('constructor', '${c.team_name}')" class="hover:bg-white/5 transition-colors group cursor-pointer">
                  <td class="p-6 text-center ${posStyle}">${pos}</td>
                  <td class="p-6">
                    <div class="flex items-center gap-5">
                      <div class="w-3 h-14 rounded-full shadow-sm" style="background-color: ${teamColor}"></div>
                      <div>
                        <div class="font-black text-2xl uppercase italic text-white group-hover:text-red-400 transition-colors">${c.team_name}</div>
                      </div>
                    </div>
                  </td>
                  <td class="p-6">
                    <span class="text-sm font-bold text-gray-400 uppercase tracking-widest">${c.drivers.join(', ')}</span>
                  </td>
                  <td class="p-6 text-center">
                    <div class="bg-red-500/10 border border-red-500/20 py-2 rounded-xl inline-block min-w-[100px] group-hover:bg-red-500/20 transition-colors">
                      <span class="text-4xl font-black italic text-white drop-shadow-md">${c.points}</span>
                      <span class="text-xs text-red-500 font-bold ml-1">PTS</span>
                    </div>
                  </td>
                </tr>
              `;
            });
        }
        
        html += `
                  </tbody>
                </table>
              </div>
            </div>
        `;
      }
      
      html += `</div></div>`;
      elMainContent.innerHTML = html;
      refreshIcons();
    }

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      loadMeetings(state.year);
    });

  </script>
</body>
</html>
